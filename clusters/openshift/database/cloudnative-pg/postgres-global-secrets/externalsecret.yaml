# Shared S3 credentials for CNPG Barman backups. Reads the SAME 1Password
# `rustfs` item the Talos cluster uses (homelab-prod vault, populated by
# Talos), so no new pre-seed step is required. RustFS lives at
# 192.168.10.133:30292 and is reachable from the SNO LAN.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-s3-credentials
  namespace: cloudnative-pg
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: cnpg-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: rustfs
        property: rustfs-workload-access-key
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: rustfs
        property: rustfs-workload-secret-key
