apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
      # PreSync hook can wedge the entire app-of-apps behind a stale
      # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
      # kicks a fresh sync against current git on the next reconcile.
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
