# GPU Worker Talos Configuration
# Network topology (2026-06-11): single virtio NIC on vmbr1, Main LAN
# 192.168.10.x (DHCP). The DL360 Gen9 host has ONE fiber uplink — there is
# no dedicated TrueNAS/storage link anymore; LAN + storage (NFS/RustFS at
# 192.168.10.133) share that uplink.
# DHCP is Talos's DEFAULT on all physical links — do NOT pin a DHCPv4Config
# to an interface name: PCIe enumeration shifts when VM hardware changes
# (the 2026-06-11 second-disk addition moved the NIC off ens18 and the
# pinned config left the node IP-less and unreachable; fix required a
# reprovision). nodeIP.validSubnets below handles address selection instead.
machine:
  kubelet:
    nodeIP:
      validSubnets:
      - 192.168.10.0/24
  kernel:
    modules:
    - name: nvidia
    - name: nvidia_uvm
    - name: nvidia_drm
    - name: nvidia_modeset
  sysctls:
    net.core.bpf_jit_harden: 1
