# local-path provisions volumes by spawning a busybox "helper" pod that mounts
# the host path. That pod needs an SCC allowing hostPath (restricted-v2 and the
# cluster-wide nonroot-v2 both forbid hostPath). The helper's SA varies by
# version (default vs the provisioner SA), so grant hostmount-anyuid to ALL
# service accounts in this single-purpose namespace via the
# system:serviceaccounts:local-path-storage group. Scoped to one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-path-provisioner-hostmount-anyuid
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:hostmount-anyuid
subjects:
  - kind: Group
    name: system:serviceaccounts:local-path-storage
    apiGroup: rbac.authorization.k8s.io
