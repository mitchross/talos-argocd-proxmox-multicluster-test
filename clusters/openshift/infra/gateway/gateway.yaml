apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-gateway
  namespace: openshift-ingress
  labels:
    # external-dns watches gateways with this label (--gateway-label-filter)
    external-dns-gateway: gateway-external
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    cert-manager.io/cluster-issuer: cloudflare-cluster-issuer
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.vanillax.xyz"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.vanillax.xyz"
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-openshift-gateway-apps
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: All
