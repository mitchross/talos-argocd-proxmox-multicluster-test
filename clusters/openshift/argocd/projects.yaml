# OpenShift starts with two broad projects. Keep these permissive while this
# is a single-operator homelab reference; tighten before sharing write access.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: openshift-infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "OpenShift platform services and controllers."
  sourceRepos:
    - https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: openshift-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "OpenShift user-facing applications."
  sourceRepos:
    - https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
  destinations:
    - namespace: "*"
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
