# fizzy binds privileged port :80 as root. anyuid was NOT enough — under anyuid
# the container still lacks NET_BIND_SERVICE, so it got "bind :80: permission
# denied". privileged grants the capability. (2026-06-17; was anyuid.)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fizzy-privileged
  namespace: fizzy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: default
    namespace: fizzy
