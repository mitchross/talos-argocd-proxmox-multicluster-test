apiVersion: v1
kind: Namespace
metadata:
  name: local-path-storage
  labels:
    # Helper pods bind-mount the host directory (hostPath), which requires the
    # privileged Pod Security level. The hostmount-anyuid SCC (bound to the
    # default SA below) authorizes the hostPath + uid behavior.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
