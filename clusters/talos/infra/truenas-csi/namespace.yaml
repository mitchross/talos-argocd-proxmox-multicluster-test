apiVersion: v1
kind: Namespace
metadata:
  name: truenas-csi
  labels:
    # The node plugin needs privileged host mounts and bidirectional mount
    # propagation to publish NFS volumes through kubelet.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged

