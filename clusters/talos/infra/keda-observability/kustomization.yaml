# KEDA observability overlay — optional, post-monitoring.
# Deployed by infrastructure/controllers/argocd/apps/custom-entrypoints/keda-observability-app.yaml
# at a wave AFTER kube-prometheus-stack so the monitoring.coreos.com CRDs exist.
# Bootstrap-critical KEDA lives in infrastructure/controllers/keda and renders
# ZERO monitoring CRs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: keda
resources:
  - servicemonitors.yaml
