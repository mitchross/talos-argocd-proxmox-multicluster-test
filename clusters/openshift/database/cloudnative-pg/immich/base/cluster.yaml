# Base CNPG Cluster manifest — NO bootstrap stanza. See gitea/base/cluster.yaml
# for serverName bump rationale.
#
# Plugin-mode backup config (replaces deprecated spec.backup.barmanObjectStore;
# removed in CNPG 1.30.0). The S3 destination + retention live on a sibling
# ObjectStore CR (base/objectstore.yaml). Migration plan:
# docs/plans/cnpg-plugin-migration.md.
#
# Note on the cluster image: this cluster runs the vchord vector extension
# (shared_preload_libraries: vchord.so) on cloudnative-vectorchord image.
# The barman-cloud plugin sidecar runs in a separate container in the
# Postgres pod and is image-agnostic, so the migration is expected to be
# transparent to the vchord setup. Per the migration plan, immich is the
# last cluster to migrate so all of the verification learnings from
# temporal/paperless/gitea apply here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database
  labels:
    app: immich
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      shared_buffers: "256MB"
      max_wal_size: "1GB"
      max_connections: "500"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 50Gi
    storageClass: local-path
  walStorage:
    size: 50Gi
    storageClass: local-path
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: false
