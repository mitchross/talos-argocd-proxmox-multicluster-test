apiVersion: batch/v1
kind: Job
metadata:
  name: llmfit-dual-gpu
  namespace: llmfit
  labels:
    app: llmfit-dual
spec:
  # Suspended by default so it doesn't consume both GPUs until you explicitly allow it
  # Change to suspend: false when you want to run a dual-gpu benchmark
  suspend: false
  template:
    metadata:
      labels:
        app: llmfit-dual
    spec:
      restartPolicy: Never
      runtimeClassName: nvidia
      priorityClassName: gpu-workload-high
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: "gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      containers:
      - name: llmfit
        image: ghcr.io/alexsjones/llmfit:latest@sha256:72dd6b7ec2d3c7ae20e91e22ccdbb4e6cb24ad77ef48558f49050f1dfe45bd77
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: "8000m"
            memory: 32Gi
            nvidia.com/gpu: "2"
          requests:
            cpu: "2000m"
            memory: 16Gi
            nvidia.com/gpu: "2"
      nodeSelector:
        feature.node.kubernetes.io/pci-0300_10de.present: "true"
