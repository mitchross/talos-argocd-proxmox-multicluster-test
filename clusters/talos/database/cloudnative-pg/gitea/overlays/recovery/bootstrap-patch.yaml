apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
spec:
  bootstrap:
    recovery:
      source: gitea-recovery-source
      database: gitea
      owner: gitea
      secret:
        name: gitea-app-secret
      # PITR to just before the 2026-06-02 full-cluster nuke (which hit at
      # ~12:46 UTC on 2026-06-01). We MUST stop WAL replay before the nuke:
      # the empty post-nuke cluster ran on the same v2 lineage and archived
      # its own (low-segment, fresh-timeline) WAL there, so "latest-WAL"
      # could replay post-nuke garbage. 12:40 is after the last good base
      # backup (2026-06-01T04:00:01) and before the nuke → latest clean state.
      # If CNPG FATALs "recovery ended before target reached", the pre-nuke
      # WAL didn't reach 12:40 — fall back to an earlier targetTime.
      recoveryTarget:
        targetTime: "2026-06-01T12:40:00Z"
  # Plugin-shape externalClusters (replaces the deprecated in-tree
  # barmanObjectStore field on externalClusters[]; removed in CNPG 1.30.0).
  # Reuses the prod ObjectStore CR (base/objectstore.yaml) — the only thing
  # that differs from the prod path is the serverName, which selects the
  # PRIOR lineage subtree on the same RustFS bucket. Migration plan:
  # docs/plans/cnpg-plugin-migration.md.
  externalClusters:
    - name: gitea-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          # Reuse the prod ObjectStore (same bucket, same creds, same
          # endpoint). Only serverName changes between live writes and
          # recovery reads.
          barmanObjectName: gitea-objectstore
          # Recover FROM v5 — the lineage superseded by the 2026-06-12 rebuild.
          # base/cluster.yaml writes forward to v6.
          # CAUTION: all prior base backups are multipart and therefore
          # unreadable until the RustFS multipart bug is fixed — this overlay
          # cannot actually restore today; it is kept at N-1 by convention.
          # Keep this at N-1 relative to base when bumping for the next DR.
          serverName: gitea-database-v5
