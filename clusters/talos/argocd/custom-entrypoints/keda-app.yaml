# KEDA — standalone Application (not via AppSet).
#
# Standalone because the infrastructure AppSet's sync history is currently
# tangled with repo-server caching (adding paths to the AppSet generator
# wasn't getting reflected live; Argo kept reverting the update). Direct
# Application manifest dodges that path entirely — identical pattern to
# longhorn-app.yaml, snapshot-controller-app.yaml, volsync-app.yaml,
# pvc-plumber-app.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: talos-infrastructure
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/keda
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # NOTE: KEDA core renders ZERO monitoring.coreos.com resources (the chart's
      # ServiceMonitors are disabled in values.yaml; the SMs live in the separate
      # post-monitoring keda-observability app). So this bootstrap-critical app
      # syncs cleanly on a fresh cluster WITHOUT Prometheus Operator CRDs — no
      # SkipDryRunOnMissingResource needed here (removed 2026-06-01).
      - RespectIgnoreDifferences=true
      - Replace=false
    retry:
      # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
      # PreSync hook can wedge the entire app-of-apps behind a stale
      # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
      # kicks a fresh sync against current git on the next reconcile.
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m
