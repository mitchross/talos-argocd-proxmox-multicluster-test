# INTERNAL route (local network only, via gateway-internal) — mirrors llama-cpp.
# vLLM exposes an OpenAI-compatible API; clients hit https://vllm.vanillax.me/v1/...
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vllm-route
  namespace: vllm
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-internal-technitium
    namespace: gateway
  hostnames:
  - "vllm.vanillax.me"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    timeouts:
      request: 30m            # long generations
      backendRequest: 30m
    backendRefs:
    - group: ""
      kind: Service
      name: vllm-service
      port: 8080
      weight: 1
