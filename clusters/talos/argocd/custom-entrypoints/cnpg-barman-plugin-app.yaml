# CloudNativePG Barman Cloud Plugin — replaces deprecated native barmanObjectStore
# (removed in CNPG 1.30.0). Standalone Application (not in infrastructure AppSet)
# because the manifest is namespace-co-located with the CNPG operator and
# must be ready before any Cluster references a barman-cloud plugin.
#
# Destination namespace: must match the CNPG operator's namespace. CNPG
# plugin discovery only finds Services within the operator's own namespace
# (https://cloudnative-pg.io/plugin-barman-cloud/docs/next/installation/).
# Operator runs in `cloudnative-pg` (per cloudnative-pg-operator-app.yaml),
# so the plugin lands there too. The old install in `cnpg-system` had to be
# cleaned up manually after this fix landed (see commit body).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-barman-plugin
  namespace: argocd
  annotations:
    # Wave 3 (before database AppSet at Wave 4) so Clusters can reference it
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/database"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/database/cnpg-barman-plugin
  destination:
    server: https://kubernetes.default.svc
    # Must equal the CNPG operator's namespace (plugin discovery requirement).
    namespace: cloudnative-pg
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
      # PreSync hook can wedge the entire app-of-apps behind a stale
      # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
      # kicks a fresh sync against current git on the next reconcile.
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
