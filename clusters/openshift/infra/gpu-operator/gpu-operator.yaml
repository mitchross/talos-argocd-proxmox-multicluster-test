# NVIDIA GPU Operator via OLM (gpu-operator-certified, certified-operators).
# Subscription omits `channel:` -> OLM uses the package defaultChannel.
apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: nvidia-gpu-operator
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  targetNamespaces:
    - nvidia-gpu-operator
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: gpu-operator-certified
  namespace: nvidia-gpu-operator
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  name: gpu-operator-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
# ClusterPolicy — mirrors the OpenShift default from the CSV alm-examples.
# The CRD marks daemonsets/dcgm/dcgmExporter/devicePlugin/driver/gfd/
# nodeStatusExporter/operator/toolkit as required, so a bare spec is invalid.
# use_ocp_driver_toolkit builds the driver in-cluster (no entitlement needed).
# CR fails until the CSV installs the CRD; AppSet retry + selfHeal lands it.
apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  name: gpu-cluster-policy
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  operator:
    defaultRuntime: crio
    use_ocp_driver_toolkit: true
    initContainer: {}
  daemonsets:
    rollingUpdate:
      maxUnavailable: "1"
    updateStrategy: RollingUpdate
  driver:
    enabled: true
    upgradePolicy:
      autoUpgrade: true
      drain:
        deleteEmptyDir: false
        enable: false
        force: false
        timeoutSeconds: 300
      maxParallelUpgrades: 1
      maxUnavailable: 25%
      podDeletion:
        deleteEmptyDir: false
        force: false
        timeoutSeconds: 300
      waitForCompletion:
        timeoutSeconds: 0
  toolkit:
    enabled: true
  devicePlugin:
    enabled: true
    config:
      name: ""
      default: ""
  dcgm:
    enabled: true
  dcgmExporter:
    enabled: true
    config:
      name: ""
    serviceMonitor:
      # Scraped by user-workload monitoring (infra/monitoring-config).
      enabled: true
  gfd:
    enabled: true
  nodeStatusExporter:
    enabled: true
  migManager:
    enabled: true
  mig:
    strategy: single
  sandboxWorkloads:
    enabled: false
    defaultWorkload: container
  sandboxDevicePlugin:
    enabled: true
  vgpuManager:
    enabled: false
  vgpuDeviceManager:
    enabled: true
  vfioManager:
    enabled: true
  gds:
    enabled: false
  validator:
    plugin:
      env:
        - name: WITH_WORKLOAD
          value: "false"
