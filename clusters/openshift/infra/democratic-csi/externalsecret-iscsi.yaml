apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-iscsi-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-iscsi-config
    creationPolicy: Owner
  data:
    # democratic-csi mounts this secret and reads the key
    # `driver-config-file.yaml`. Store the FULL driver config YAML (driver
    # type + httpConnection apiKey + zfs/iscsi target settings) as a single
    # 1Password field. See README.md for the template.
    - secretKey: driver-config-file.yaml
      remoteRef:
        key: democratic-csi-truenas-iscsi
        property: config
