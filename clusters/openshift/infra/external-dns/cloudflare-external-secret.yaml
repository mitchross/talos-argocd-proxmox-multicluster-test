apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    # Same vanillax.xyz Cloudflare DNS token used by the OpenShift
    # cert-manager issuer (cloudflared-sno/api-token). Needs Zone.Read +
    # DNS:Edit on the vanillax.xyz zone.
    - secretKey: api-token
      remoteRef:
        key: cloudflared-sno
        property: api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
