# OpenShift-only: the cloudflare-cluster-issuer must validate vanillax.xyz
# DNS-01 challenges. The shared base reads the `api-token` field of the
# homelab-prod `cert-manager-proxmox` item, which only has Zone access for
# vanillax.me (used by Talos). OpenShift reads a SECOND field on the SAME item,
# `api-token-xyz`, holding a Cloudflare token with Zone.Read + DNS:Edit for the
# vanillax.xyz zone. Same vault/item — no homelab-lab vault or Connect grant
# needed. Talos keeps the base `api-token` field unchanged.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflared-sno
        property: api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
