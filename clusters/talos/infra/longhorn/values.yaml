# It's recommended to manage all Longhorn settings via this file
# to maintain a declarative GitOps workflow.
# Settings applied manually via the UI will not be reflected here and can be
# overwritten during a Helm upgrade.
#
# V1 (default) data engine — restored 2026-06-12 after the V2/SPDK experiment
# failed under full-DR restore load (open Longhorn 1.12 bugs #13315/#13314:
# interrupted rebuilds permanently poison replica metadata; re-crash after
# auto-reattach). V1 is upstream's default engine, still actively maintained,
# and ran this cluster stably for months before the V2 rebuild. Data path is
# the default /var/lib/longhorn (bind-mounted from /var/local/longhorn on the
# single 800G disk by the cluster template's longhorn-storage patch). Engines
# cannot be flipped on a live cluster with attached volumes — this config is
# applied via nuke + rebuild with restore-from-backup (the proven DR flow).
# History: V2 forensics in git history; short version in docs/disaster-recovery.md.
defaultSettings:
  # NOTE: Longhorn 1.10 consolidates settings for V1/V2 data engines. Use either
  # a single scalar or a JSON string with per-engine values like {"v1":"...","v2":"..."} when needed.
  defaultDataPath: "/var/lib/longhorn"
  storageMinimalAvailablePercentage: "10"
  # 200% was the previous floor (replicaCount=2 doubles every PVC against the
  # scheduling limit). 2026-04-27 the cluster crossed 200% allocation on
  # `talos-prod-cluster-workers-smgrbs` (1077 Gi reserved vs 1046 Gi cap →
  # node went Unschedulable). Actual cluster fill is only 228 Gi / 4184 Gi
  # physical (~5%) — every big PVC (immich/library 300G@5.8G used, posthog
  # clickhouse 100G@23G, project-nomad nomad-storage 120G@2.4G) reserves
  # full PVC size × replica count. Bumping the over-provisioning cap to 300%
  # gives ~1568 Gi reservation budget per node, restoring Schedulable.
  # Rebalance/PVC-shrink/migrate-to-NFS are the long-term levers; this is
  # the band-aid that unsticks scheduling immediately.
  storageOverProvisioningPercentage: "300"
  allowRecurringJobWhileVolumeDetached: "true"
  replicaAutoBalance: "best-effort"
  # Ensure new consolidated settings that can be per-engine stay simple scalars for V1-only clusters
  # These avoid parse errors like strconv.ParseBool/Int seen in manager logs when JSON strings are provided.
  # Note: Use plain values, not JSON format - JSON causes "mismatched data engines" errors
  fastReplicaRebuildEnabled: "true"
  engineReplicaTimeout: "8"
  # Percentage of allocatable CPU reserved per instance-manager pod (NOT cores).
  # Chart default is 12; "8" is the proven homelab value from the V1 era.
  # V1 instance managers do NOT busy-poll (that was V2/SPDK's reactor model,
  # which burned ~4-5 cores per node at 100% even when idle — one of the
  # reasons V2 was retired on 2026-06-12). 8% of a 32-core worker ≈ 2.5 cores
  # reserved, plenty for V1's interrupt-driven engines.
  # Avoid per-engine JSON strings — they trip "mismatched data engines" errors.
  guaranteedInstanceManagerCPU: "8"
  # NOTE 2026-06-09: a previous `guaranteedInstanceManagerMemory: "1Gi"` was
  # removed here — Longhorn has NO instance-manager memory-guarantee setting
  # (only the CPU one above exists in the chart/setting schema), so the key was
  # a silent no-op: it rendered into the longhorn-default-setting ConfigMap but
  # longhorn-manager ignored it, and instance-manager pods never received the
  # intended memory requests. The 2026-05-04 scheduler-math concern it tried to
  # address (IM/share-manager pods with zero memory requests) is therefore still
  # open and must be solved another way (node sizing / IM pod overhead), not via
  # a Longhorn setting.
  # Performance: prefer local disk for reads when replica is on same node
  defaultDataLocality: "best-effort"
  # Cleanup: limit snapshot accumulation per volume
  snapshotMaxCount: "10"
  autoCleanupSystemGeneratedSnapshot: "true"
  # Allow Longhorn to auto-upgrade volume engines after manager upgrades
  concurrentAutomaticEngineUpgradePerNodeLimit: "3"
  # Allow detached volumes to rebuild replicas (fixes VolSync clone volumes
  # stuck in VolumeCloneCopyCompleteAwaitingHealthy with replica count > 1)
  offlineReplicaRebuilding: "true"
  # V1 data engine is the chart default — no v1DataEngine/v2DataEngine keys
  # needed. REMOVED 2026-06-12: v2DataEngine "true" + v1DataEngine "false" +
  # createDefaultDiskLabeledNodes + storageReservedPercentageForDefaultDisk
  # (all V2-block-disk plumbing). With V1, Longhorn auto-creates its default
  # filesystem disk at defaultDataPath (/var/lib/longhorn) on every node
  # running longhorn-manager, and the chart's default 30% storage reservation
  # is CORRECT again — the data path shares the 800G disk with Talos system +
  # images + pod ephemeral, which is exactly the shared-OS-disk setup that
  # reservation exists to protect.
# -- Disables the pre-upgrade check job. This is recommended for GitOps tools
# like ArgoCD to prevent sync failures.
preUpgradeChecker:
  jobEnabled: false
persistence:
  # -- The chart-created `longhorn` StorageClass, cluster default. The class
  # KEEPS the name `longhorn` deliberately — 40+ PVCs across my-apps/
  # monitoring/infrastructure, the inline VolSync ReplicationSource/
  # Destination configs, the pvc-plumber backup contract, and the CLAUDE.md /
  # add-backup guidance all reference `storageClassName: longhorn` explicitly.
  # With no dataEngine override the class provisions V1 volumes (chart
  # default) — the `dataEngine: v2` routing was removed 2026-06-12.
  defaultClass: true
  # -- Default number of replicas for volumes.
  # Set to 2 for node-failure resilience. With replica 1, a single node going
  # down makes all its volumes unavailable and causes stale attachment cascades.
  # With replica 2, Longhorn serves from the surviving replica on another node.
  # Trade-off: doubles storage usage (~932GB -> ~1.86TB of ~2TB capacity).
  # VolSync + Kopia still handles off-cluster backup to NFS.
  defaultClassReplicaCount: 2
  # -- Default filesystem type.
  defaultFsType: ext4
  defaultDataLocality: best-effort
  # -- Reclaim policy for the default storage class.
  reclaimPolicy: Delete
# -- Disable the default ingress creation, as you are managing it with a
# separate HTTPRoute resource.
ingress:
  enabled: false