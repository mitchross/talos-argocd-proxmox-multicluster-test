# democratic-csi — TrueNAS iSCSI release (truenas-iscsi)
# Backs the portable `vanillax-local-rwo` RWO block StorageClass on OpenShift,
# the analog of Longhorn on Talos. Network block over the 10G link to TrueNAS
# (192.168.10.133). Chosen over LVMS because democratic-csi is a Helm CSI
# driver, NOT an OLM operator, so it does not depend on the redhat-operators
# catalog (which does not publish lvms-operator on 4.22.0-rc.5).

csiDriver:
  # Must be globally unique on the cluster and match the StorageClass
  # provisioner generated by the chart.
  name: org.democratic-csi.iscsi

# OpenShift: let the chart create the SecurityContextConstraints bindings so
# the controller/node pods can run privileged with host networking/mounts.
controller:
  rbac:
    openshift:
      privileged: true
node:
  rbac:
    openshift:
      privileged: true
  driver:
    # RHCOS has no /etc/localtime to bind-mount; null disables the mount.
    localtimeHostPath: null

driver:
  # Connection + ZFS/iSCSI target config lives in a 1Password-backed Secret
  # (see externalsecret-iscsi.yaml and README.md). Never commit TrueNAS creds.
  existingConfigSecret: truenas-iscsi-config
  config:
    # Still required even with existingConfigSecret — the chart uses this to
    # wire driver-specific behavior. Must match `driver:` inside the secret.
    driver: freenas-api-iscsi

storageClasses:
  - name: vanillax-local-rwo
    # Portable default RWO class (mirrors the LVMS deviceClass default:true it
    # replaces). Apps reference this name on both clusters.
    defaultClass: true
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: ext4

# Enable CSI snapshots backed by ZFS snapshots on TrueNAS.
volumeSnapshotClasses:
  - name: vanillax-local-rwo-snapshot
    deletionPolicy: Delete
