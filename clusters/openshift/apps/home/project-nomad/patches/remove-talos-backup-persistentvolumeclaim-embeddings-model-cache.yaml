apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: embeddings-model-cache
  namespace: project-nomad
  labels:
    backup-exempt:
  annotations:
    storage.vanillax.dev/backup-exempt-reason:
# Regenerable embeddings model cache — node-local local-path, no TrueNAS dependency.
spec:
  storageClassName: local-path
