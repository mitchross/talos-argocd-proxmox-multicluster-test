apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 50-master-local-path-provisioner
  labels:
    # SNO: the single node is in the master MachineConfigPool.
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.4.0
    systemd:
      units:
        # RHCOS is immutable + SELinux-enforcing. local-path helper pods write
        # under /opt/local-path-provisioner via hostPath; that directory must
        # exist and carry the container_file_t SELinux label or writes are
        # denied. This oneshot creates + labels it before kubelet starts.
        # NOTE: applying this MachineConfig reboots the node once.
        - name: local-path-provisioner.service
          enabled: true
          contents: |
            [Unit]
            Description=Create and SELinux-label the local-path-provisioner directory
            Before=kubelet.service
            ConditionPathExists=!/opt/local-path-provisioner

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            ExecStart=/bin/mkdir -p /opt/local-path-provisioner
            ExecStart=/usr/bin/chcon -Rt container_file_t /opt/local-path-provisioner

            [Install]
            WantedBy=multi-user.target
