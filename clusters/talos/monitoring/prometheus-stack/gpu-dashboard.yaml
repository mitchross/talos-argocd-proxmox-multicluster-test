# GPU Monitoring Dashboard (Grafana)
#
# Grafana auto-discovers this ConfigMap via the sidecar (grafana_dashboard: "1" label)
# and imports the JSON at data."gpu-overview.json".
#
# Data source: Prometheus, scraping dcgm-exporter (monitoring/prometheus-stack/dcgm-exporter.yaml).
# The dcgm-exporter ServiceMonitor causes Prometheus to relabel colliding labels:
#   pod                 -> the dcgm-exporter pod (scrape target)
#   exported_pod        -> the GPU-using pod (what we actually care about)
#   exported_namespace  -> GPU-user's namespace
#   exported_container  -> GPU-user's container name
# Always use exported_* in queries, never the bare label.
#
# Layout answers "what's happening on my GPUs right now?" in three rows:
#   Row 1 - At-a-glance stats: pods with GPUs, total VRAM, total power, avg util
#   Row 2 - Pod Task Manager table: pod -> card -> VRAM/power/util/temp (THE main view)
#   Row 3 - Per-card time series: util %, VRAM MiB, power W, temp C
#   Row 4 - Reliability: XID errors, total energy kWh, clocks
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  gpu-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "schemaVersion": 39,
      "title": "GPU Overview",
      "uid": "gpu-overview",
      "tags": ["gpu", "nvidia", "dcgm"],
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "templating": { "list": [] },
      "panels": [
        { "type": "row", "id": 100, "title": "At a glance", "gridPos": {"x":0,"y":0,"w":24,"h":1}, "collapsed": false },

        { "type": "stat", "id": 1, "title": "Pods using GPUs",
          "gridPos": {"x":0,"y":1,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"count(count by (exported_namespace, exported_pod) (DCGM_FI_DEV_FB_USED{exported_pod!=\"\"}))","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"value","graphMode":"area"},
          "fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null}]}}}
        },

        { "type": "stat", "id": 2, "title": "Total VRAM used",
          "gridPos": {"x":6,"y":1,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(DCGM_FI_DEV_FB_USED) * 1024 * 1024","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"value","graphMode":"area"},
          "fieldConfig":{"defaults":{"unit":"bytes","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":40000000000},{"color":"red","value":45000000000}]}}}
        },

        { "type": "stat", "id": 3, "title": "Total GPU power",
          "gridPos": {"x":12,"y":1,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum(DCGM_FI_DEV_POWER_USAGE)","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"value","graphMode":"area"},
          "fieldConfig":{"defaults":{"unit":"watt","color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":300},{"color":"red","value":420}]}}}
        },

        { "type": "stat", "id": 4, "title": "Avg GPU util",
          "gridPos": {"x":18,"y":1,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"avg(DCGM_FI_DEV_GPU_UTIL)","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]},"colorMode":"value","graphMode":"area"},
          "fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"blue","value":null},{"color":"green","value":20},{"color":"yellow","value":70},{"color":"red","value":90}]}}}
        },

        { "type": "row", "id": 101, "title": "Pod Task Manager (pod -> card -> usage)", "gridPos":{"x":0,"y":5,"w":24,"h":1}, "collapsed": false },

        { "type": "table", "id": 10, "title": "Pod -> GPU allocation and current usage",
          "gridPos": {"x":0,"y":6,"w":24,"h":10},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [
            {"refId":"UTIL",   "expr":"DCGM_FI_DEV_GPU_UTIL{exported_pod!=\"\"}",             "format":"table","instant":true},
            {"refId":"VRAM",   "expr":"DCGM_FI_DEV_FB_USED{exported_pod!=\"\"} * 1024 * 1024","format":"table","instant":true},
            {"refId":"POWER",  "expr":"DCGM_FI_DEV_POWER_USAGE{exported_pod!=\"\"}",          "format":"table","instant":true},
            {"refId":"PLIMIT", "expr":"DCGM_FI_DEV_ENFORCED_POWER_LIMIT{exported_pod!=\"\"}", "format":"table","instant":true},
            {"refId":"TEMP",   "expr":"DCGM_FI_DEV_GPU_TEMP{exported_pod!=\"\"}",             "format":"table","instant":true},
            {"refId":"MEMTEMP","expr":"DCGM_FI_DEV_MEMORY_TEMP{exported_pod!=\"\"}",          "format":"table","instant":true}
          ],
          "transformations": [
            {"id":"joinByField","options":{"byField":"UUID","mode":"outer"}},
            {"id":"organize","options":{
              "excludeByName":{"Time":true,"Time 1":true,"Time 2":true,"Time 3":true,"Time 4":true,"Time 5":true,"Time 6":true,
                "__name__":true,"__name__ 1":true,"__name__ 2":true,"__name__ 3":true,"__name__ 4":true,"__name__ 5":true,"__name__ 6":true,
                "job":true,"job 1":true,"job 2":true,"job 3":true,"job 4":true,"job 5":true,"job 6":true,
                "instance":true,"instance 1":true,"instance 2":true,"instance 3":true,"instance 4":true,"instance 5":true,"instance 6":true,
                "service":true,"service 1":true,"service 2":true,"service 3":true,"service 4":true,"service 5":true,"service 6":true,
                "endpoint":true,"endpoint 1":true,"endpoint 2":true,"endpoint 3":true,"endpoint 4":true,"endpoint 5":true,"endpoint 6":true,
                "container":true,"container 1":true,"container 2":true,"container 3":true,"container 4":true,"container 5":true,"container 6":true,
                "namespace":true,"namespace 1":true,"namespace 2":true,"namespace 3":true,"namespace 4":true,"namespace 5":true,"namespace 6":true,
                "pod":true,"pod 1":true,"pod 2":true,"pod 3":true,"pod 4":true,"pod 5":true,"pod 6":true,
                "DCGM_FI_DRIVER_VERSION":true,"DCGM_FI_DRIVER_VERSION 1":true,"DCGM_FI_DRIVER_VERSION 2":true,"DCGM_FI_DRIVER_VERSION 3":true,"DCGM_FI_DRIVER_VERSION 4":true,"DCGM_FI_DRIVER_VERSION 5":true,"DCGM_FI_DRIVER_VERSION 6":true,
                "gpu 2":true,"gpu 3":true,"gpu 4":true,"gpu 5":true,"gpu 6":true,
                "device 2":true,"device 3":true,"device 4":true,"device 5":true,"device 6":true,
                "modelName 2":true,"modelName 3":true,"modelName 4":true,"modelName 5":true,"modelName 6":true,
                "Hostname 2":true,"Hostname 3":true,"Hostname 4":true,"Hostname 5":true,"Hostname 6":true,
                "exported_container 2":true,"exported_container 3":true,"exported_container 4":true,"exported_container 5":true,"exported_container 6":true,
                "exported_namespace 2":true,"exported_namespace 3":true,"exported_namespace 4":true,"exported_namespace 5":true,"exported_namespace 6":true,
                "exported_pod 2":true,"exported_pod 3":true,"exported_pod 4":true,"exported_pod 5":true,"exported_pod 6":true
              },
              "renameByName":{
                "exported_namespace 1":"Namespace",
                "exported_pod 1":"Pod",
                "exported_container 1":"Container",
                "gpu 1":"GPU#",
                "UUID":"GPU UUID",
                "modelName 1":"Model",
                "Hostname 1":"Node",
                "Value #UTIL":"Util %",
                "Value #VRAM":"VRAM",
                "Value #POWER":"Power",
                "Value #PLIMIT":"Power Limit",
                "Value #TEMP":"GPU C",
                "Value #MEMTEMP":"Mem C"
              }
            }}
          ],
          "fieldConfig": {
            "defaults": {"custom":{"align":"left"}},
            "overrides": [
              {"matcher":{"id":"byName","options":"Util %"},       "properties":[{"id":"unit","value":"percent"},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}},{"id":"min","value":0},{"id":"max","value":100}]},
              {"matcher":{"id":"byName","options":"VRAM"},         "properties":[{"id":"unit","value":"bytes"},{"id":"custom.cellOptions","value":{"type":"gauge","mode":"gradient"}},{"id":"min","value":0},{"id":"max","value":25769803776}]},
              {"matcher":{"id":"byName","options":"Power"},        "properties":[{"id":"unit","value":"watt"}]},
              {"matcher":{"id":"byName","options":"Power Limit"},  "properties":[{"id":"unit","value":"watt"}]},
              {"matcher":{"id":"byName","options":"GPU C"},        "properties":[{"id":"unit","value":"celsius"},{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":70},{"color":"red","value":85}]}}]},
              {"matcher":{"id":"byName","options":"Mem C"},        "properties":[{"id":"unit","value":"celsius"},{"id":"thresholds","value":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"yellow","value":85},{"color":"red","value":100}]}}]}
            ]
          },
          "options":{"showHeader":true}
        },

        { "type": "row", "id": 102, "title": "Per-card time series", "gridPos":{"x":0,"y":16,"w":24,"h":1}, "collapsed": false },

        { "type": "timeseries", "id": 20, "title": "GPU utilization",
          "gridPos": {"x":0,"y":17,"w":12,"h":8},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"DCGM_FI_DEV_GPU_UTIL","legendFormat":"GPU {{gpu}} - {{exported_pod}}","refId":"A"}],
          "fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}}
        },

        { "type": "timeseries", "id": 21, "title": "VRAM used",
          "gridPos": {"x":12,"y":17,"w":12,"h":8},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"DCGM_FI_DEV_FB_USED * 1024 * 1024","legendFormat":"GPU {{gpu}} - {{exported_pod}}","refId":"A"}],
          "fieldConfig":{"defaults":{"unit":"bytes"}}
        },

        { "type": "timeseries", "id": 22, "title": "Power draw vs limit",
          "gridPos": {"x":0,"y":25,"w":12,"h":8},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [
            {"expr":"DCGM_FI_DEV_POWER_USAGE",          "legendFormat":"GPU {{gpu}} - draw","refId":"A"},
            {"expr":"DCGM_FI_DEV_ENFORCED_POWER_LIMIT", "legendFormat":"GPU {{gpu}} - limit","refId":"B"}
          ],
          "fieldConfig":{"defaults":{"unit":"watt"}}
        },

        { "type": "timeseries", "id": 23, "title": "Temperatures",
          "gridPos": {"x":12,"y":25,"w":12,"h":8},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [
            {"expr":"DCGM_FI_DEV_GPU_TEMP",    "legendFormat":"GPU {{gpu}} core","refId":"A"},
            {"expr":"DCGM_FI_DEV_MEMORY_TEMP", "legendFormat":"GPU {{gpu}} memory","refId":"B"}
          ],
          "fieldConfig":{"defaults":{"unit":"celsius"}}
        },

        { "type": "row", "id": 103, "title": "Reliability & energy", "gridPos":{"x":0,"y":33,"w":24,"h":1}, "collapsed": false },

        { "type": "stat", "id": 30, "title": "XID errors (24h)",
          "gridPos": {"x":0,"y":34,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum by (gpu) (increase(DCGM_FI_DEV_XID_ERRORS[24h]))","legendFormat":"GPU {{gpu}}","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig":{"defaults":{"color":{"mode":"thresholds"},"thresholds":{"mode":"absolute","steps":[{"color":"green","value":null},{"color":"red","value":1}]}}}
        },

        { "type": "stat", "id": 31, "title": "Total energy (kWh, since boot)",
          "gridPos": {"x":6,"y":34,"w":6,"h":4},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [{"expr":"sum by (gpu) (DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION) / 3600000000","legendFormat":"GPU {{gpu}}","refId":"A"}],
          "options": {"reduceOptions":{"calcs":["lastNotNull"]}},
          "fieldConfig":{"defaults":{"unit":"kwatth","decimals":2}}
        },

        { "type": "timeseries", "id": 32, "title": "Clocks (SM / memory)",
          "gridPos": {"x":12,"y":34,"w":12,"h":8},
          "datasource": {"type":"prometheus","uid":"prometheus"},
          "targets": [
            {"expr":"DCGM_FI_DEV_SM_CLOCK",  "legendFormat":"GPU {{gpu}} SM","refId":"A"},
            {"expr":"DCGM_FI_DEV_MEM_CLOCK", "legendFormat":"GPU {{gpu}} mem","refId":"B"}
          ],
          "fieldConfig":{"defaults":{"unit":"rothz"}}
        }
      ]
    }
