# Base CNPG Cluster manifest — NO bootstrap stanza. See gitea/base/cluster.yaml
# for serverName bump rationale.
#
# Plugin-mode backup config (replaces deprecated spec.backup.barmanObjectStore;
# removed in CNPG 1.30.0). The S3 destination + retention live on a sibling
# ObjectStore CR (base/objectstore.yaml). Migration plan:
# docs/plans/cnpg-plugin-migration.md.
#
# Note on the cluster image: this cluster runs the vchord vector extension
# (shared_preload_libraries: vchord.so) on cloudnative-vectorchord image.
# The barman-cloud plugin sidecar runs in a separate container in the
# Postgres pod and is image-agnostic, so the migration is expected to be
# transparent to the vchord setup. Per the migration plan, immich is the
# last cluster to migrate so all of the verification learnings from
# temporal/paperless/gitea apply here.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-database
  labels:
    app: immich
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17.5-0.4.3
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
    limits:
      memory: 2Gi
  postgresql:
    shared_preload_libraries:
      - "vchord.so"
    parameters:
      shared_buffers: "256MB"
      max_wal_size: "1GB"
      max_connections: "500"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 50Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      # Designates this Cluster as the active WAL writer for the referenced
      # ObjectStore. Keep at most one Cluster per ObjectStore as
      # isWALArchiver=true.
      isWALArchiver: true
      parameters:
        # Name of the sibling ObjectStore CR (see base/objectstore.yaml).
        barmanObjectName: immich-objectstore
        # Preserved from previous spec.backup.barmanObjectStore.serverName —
        # see cnpg-plugin-migration.md §9.1.
        #   v1 — baseline after the 2026-04-19 RustFS wipe; written through the
        #        2026-06-11 nuke. Unrestorable (RustFS multipart bug) — abandoned.
        #   v2 — opened+dirtied 2026-06-11 by the aborted first rebuild attempt
        #        (ContinuousArchiving went True before the re-nuke). Abandoned.
        #   v3 — opened 2026-06-11 for the RE-nuke (SPDK cpu-mask validation
        #        run); fresh initdb on a clean prefix so WAL archiving works.
        #   v4 — opened 2026-06-12 after another initdb rebuild. Reusing v3
        #        failed Barman's required empty-archive check.
        # DO NOT change this value without bumping lineage in lockstep.
        serverName: immich-database-v4
