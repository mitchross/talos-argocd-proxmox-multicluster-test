# pvc-plumber-adopt — canary-scoped RBAC for the adopt CLI.
#
# Patch 7.6 of git history (pvc-plumber-v4 docs, pruned 2026-06-13).
#
# This file is independent of rbac.yaml. The main pvc-plumber operator
# ServiceAccount (pvc-plumber, in rbac.yaml) is NOT modified by this
# file — its `pvc-plumber:audit-reader` ClusterRole stays read-only
# forever. The new ServiceAccount below is bound to its own minimal
# Role + ClusterRole and is NOT consumed by the operator Deployment.
#
# Runtime path: operators invoke the adopt CLI by launching a one-shot
# pod that uses this ServiceAccount, e.g.:
#
#   kubectl run pvc-plumber-adopt-canary-<short> \
#     --rm -i --tty -n pvc-plumber \
#     --image=ghcr.io/mitchross/pvc-plumber:4.0.0-permissive-rc5@sha256:8a90594... \
#     --restart=Never \
#     --overrides='{"spec":{"serviceAccountName":"pvc-plumber-adopt", ...}}'
#     --command -- /pvc-plumber-adopt <subcommand> ...
#
# RBAC philosophy: hard-minimum. Every rule below is the smallest verb
# set on the smallest resource name set needed for the nginx-example /
# storage canary to succeed. No `list`, no `watch`, no patches on RS/RD,
# no Secret access, no Argo writes. Adding a new canary (e.g. karakeep)
# requires explicit per-canary RBAC additions in a follow-up patch —
# never a wildcard.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pvc-plumber-adopt
  namespace: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber-adopt
    app.kubernetes.io/component: adoption-cli
automountServiceAccountToken: true
---
# Cluster-scoped read of a single named Namespace.
#
# Why cluster-scoped: Namespace is a cluster resource. The adopt
# validate.go pipeline calls c.Get(ctx, NamespacedName{Name: ns},
# &corev1.Namespace{}) to verify the target namespace carries the
# `volsync.backube/privileged-movers="true"` label (required by the
# ClusterExternalSecret kopia-Secret fanout). This call cannot be
# authorized by a Role — Namespace is cluster-scoped.
#
# Why resourceNames narrows it: limits the cluster-wide Namespace read
# to exactly one named namespace. Future canaries append names here
# per explicit go-ahead; never wildcards.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-plumber-adopt:canary-namespace-reader
  labels:
    app.kubernetes.io/name: pvc-plumber-adopt
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    resourceNames: ["nginx-example"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-plumber-adopt:canary-namespace-reader
  labels:
    app.kubernetes.io/name: pvc-plumber-adopt
subjects:
  - kind: ServiceAccount
    name: pvc-plumber-adopt
    namespace: pvc-plumber
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-plumber-adopt:canary-namespace-reader
---
# Namespace-scoped, resourceName-pinned read + PVC patch.
#
# Hard minimum:
#   - PVC `storage` only: get + patch. Patch is the load-bearing write
#     used by /pvc-plumber-adopt apply via server-side apply.
#   - ReplicationSource `storage` only: get. Adopt reads to verify
#     current shape; never writes.
#   - ReplicationDestination `storage-dst` only: get. Same.
#
# Note: `resourceNames` is not honored for list/watch in Kubernetes RBAC
# (those verbs do not act on a named object). We intentionally do NOT
# grant list/watch on any resource here — the CLI reads by name only,
# so list/watch are not needed and would defeat the resourceName scope.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pvc-plumber-adopt:nginx-example
  namespace: nginx-example
  labels:
    app.kubernetes.io/name: pvc-plumber-adopt
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    resourceNames: ["storage"]
    verbs: ["get", "patch"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources"]
    resourceNames: ["storage"]
    verbs: ["get"]
  - apiGroups: ["volsync.backube"]
    resources: ["replicationdestinations"]
    resourceNames: ["storage-dst"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pvc-plumber-adopt:nginx-example
  namespace: nginx-example
  labels:
    app.kubernetes.io/name: pvc-plumber-adopt
subjects:
  - kind: ServiceAccount
    name: pvc-plumber-adopt
    namespace: pvc-plumber
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pvc-plumber-adopt:nginx-example
