apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-workload-high
  annotations:
    description: "High priority for primary AI workloads (llama-cpp)"
value: 1000
globalDefault: false
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-workload-background
  annotations:
    description: "Background priority for batch AI workloads"
value: 100
globalDefault: false
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: gpu-workload-preemptible
  annotations:
    description: "Low priority for secondary AI workloads (ComfyUI) - preempted by llama-cpp"
value: 50
globalDefault: false
preemptionPolicy: PreemptLowerPriority
