apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: openshift-gateway
  namespace: openshift-ingress
  labels:
    # external-dns watches gateways with this label (--gateway-label-filter)
    external-dns-gateway: gateway-external
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    cert-manager.io/cluster-issuer: cloudflare-cluster-issuer
    # Default CNAME target for every external-dns-published HTTPRoute on this
    # Gateway (mirrors the Talos gw-external annotation). Without this, a
    # route labeled external-dns: "true" but missing its own per-route target
    # annotation publishes the Gateway's LoadBalancer address — the PRIVATE
    # MetalLB IP 192.168.10.230 — into public Cloudflare DNS (broken outside
    # the LAN; searxng hit exactly this).
    external-dns.alpha.kubernetes.io/target: vanillax.xyz
spec:
  gatewayClassName: openshift-default
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.vanillax.xyz"
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.vanillax.xyz"
      tls:
        mode: Terminate
        certificateRefs:
          - name: cert-openshift-gateway-apps
            kind: Secret
            group: ""
      allowedRoutes:
        namespaces:
          from: All
