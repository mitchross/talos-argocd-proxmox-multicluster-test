# Temporal Worker Controller — standalone Application (not via AppSet).
# See keda-app.yaml for the rationale (AppSet revert loop during bootstrap).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal-worker-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: talos-infrastructure
  revisionHistoryLimit: 3
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/temporal-worker-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal-worker-controller
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - Replace=false
    retry:
      # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
      # PreSync hook can wedge the entire app-of-apps behind a stale
      # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
      # kicks a fresh sync against current git on the next reconcile.
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 10m
