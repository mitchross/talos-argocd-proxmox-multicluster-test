apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-iscsi-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-iscsi-config
    creationPolicy: Owner
    # Only the apiKey is secret. The rest of the driver config (pool paths,
    # TrueNAS IP, portal/initiator IDs) is non-sensitive and lives here in Git.
    # ESO renders the full `driver-config-file.yaml` that democratic-csi mounts
    # (via driver.existingConfigSecret in values-iscsi.yaml), injecting the
    # apiKey pulled from 1Password below.
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: freenas-api-iscsi
          instance_id:
          httpConnection:
            protocol: https
            host: 192.168.10.133
            port: 443
            apiKey: "{{ .apiKey }}"
            allowInsecure: true
          zfs:
            datasetParentName: BigTank/k8s/iscsi/v
            detachedSnapshotsDatasetParentName: BigTank/k8s/iscsi/s
            zvolEnableReservation: false
          iscsi:
            targetPortal: "192.168.10.133:3260"
            interface:
            namePrefix: csi-
            nameSuffix: "-cluster"
            targetGroups:
              - targetGroupPortalGroup: 1
                targetGroupInitiatorGroup: 1
                targetGroupAuthType: None
            extentInsecureTpc: true
            extentBlocksize: 512
            extentRpm: "SSD"
            extentAvailThreshold: 0
  data:
    # Pull ONLY the API key from 1Password item `democratic-csi-truenas`,
    # field `apiKey`. (iSCSI + NFS share the same TrueNAS key.)
    - secretKey: apiKey
      remoteRef:
        key: democratic-csi-truenas
        property: apiKey
