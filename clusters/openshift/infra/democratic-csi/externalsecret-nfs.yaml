apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-nfs-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-nfs-config
    creationPolicy: Owner
    # Config body lives in ConfigMap `truenas-nfs-config-tmpl` (non-secret, Git);
    # ESO injects {{ .apiKey }} and writes driver-config-file.yaml into this Secret.
    template:
      engineVersion: v2
      templateFrom:
        - target: Data
          configMap:
            name: truenas-nfs-config-tmpl
            items:
              - key: driver-config-file.yaml
                templateAs: Values
  data:
    - secretKey: apiKey
      remoteRef:
        key: democratic-csi-truenas
        property: apiKey
