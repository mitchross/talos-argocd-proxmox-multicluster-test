# OpenShift-only: the cloudflare-cluster-issuer must validate vanillax.xyz
# DNS-01 challenges. The shared base pulls the token from homelab-prod
# `cert-manager-proxmox`, which only has Zone access for vanillax.me (Talos).
# OpenShift uses the homelab-lab `cloudflared-proxmox` token, which covers the
# vanillax.xyz zone. Talos keeps the base (homelab-prod) token unchanged.
#
# Requires: the 1Password Connect integration is granted homelab-lab vault
# access, and homelab-lab is in the ClusterSecretStore vaults map.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflared-proxmox
        property: api-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
