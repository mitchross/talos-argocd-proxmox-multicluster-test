# Homelab trust boundary: these AppProjects are intentionally permissive.
# This repo is a single-operator cluster, and many "apps" legitimately manage
# namespace-scoped storage, Gateway API routes, ExternalSecrets, and occasional
# CRDs/operators. The projects are used for UI grouping and policy intent, not
# as hard multi-tenant guardrails. Tighten these before allowing untrusted app
# authors or external automation to write into manifests/apps/.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: talos-infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  # Add a finalizer to ensure that the project is deleted from ArgoCD if this file is ever removed.
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: "Infrastructure components like controllers, networking, and storage."
  sourceRepos:
  - https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: talos-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: "User-facing applications."
  sourceRepos:
  - https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: talos-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  description: "Monitoring and observability stack (Prometheus, Grafana, Loki)."
  sourceRepos:
  - https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
  destinations:
  - namespace: '*'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
