# gitea CNPG database — root kustomization
#
# DR FEATURE FLAG: change the active overlay on this line to switch
# bootstrap mode. Everything else is in Git.
#
#   overlays/initdb   = fresh DB, no data restored
#   overlays/recovery = restore from Barman S3 (see overlay for source + PITR)
#
# In-place DR also requires:
#   kubectl delete cluster gitea-database -n cloudnative-pg
#   kubectl delete pvc -n cloudnative-pg -l cnpg.io/cluster=gitea-database
# ...because CNPG evaluates spec.bootstrap only at Cluster creation and
# leaves PVCs behind on cluster delete.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cloudnative-pg
commonLabels:
  app.kubernetes.io/name: gitea-db
  app.kubernetes.io/managed-by: argocd
commonAnnotations:
  argocd.argoproj.io/sync-wave: "-5"
resources:
  # - overlays/recovery      # DR restore from Barman. ABANDONED 2026-06-02: the
                             # v2 base backups are unreadable — RustFS cannot
                             # serve MULTIPART objects ("encrypted object
                             # metadata is incomplete"; single-PUT objects are
                             # fine). All barman data.tar.gz are multipart, so
                             # no CNPG lineage is restorable until RustFS is
                             # fixed. Re-enable only after that.
  - overlays/initdb          # ← ACTIVE: fresh empty DB on the clean v3 lineage.
                             # gitea repos live on the restored gitea-shared-
                             # storage PVC; only DB metadata (users/issues)
                             # starts fresh. Create a new admin on first login.
  - externalsecret.yaml
  - scheduled-backup.yaml
