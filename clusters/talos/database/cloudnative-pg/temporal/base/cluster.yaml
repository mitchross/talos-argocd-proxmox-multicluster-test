# Base CNPG Cluster manifest — NO bootstrap stanza. See gitea/base/cluster.yaml
# for serverName bump rationale.
#
# Plugin-mode backup config (replaces deprecated spec.backup.barmanObjectStore;
# removed in CNPG 1.30.0). The S3 destination + retention live on a sibling
# ObjectStore CR (base/objectstore.yaml). Migration plan:
# docs/plans/cnpg-plugin-migration.md.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-database
  labels:
    app: temporal
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 10Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      # Designates this Cluster as the active WAL writer for the referenced
      # ObjectStore. Keep at most one Cluster per ObjectStore as
      # isWALArchiver=true; replicas / cross-cluster recovery readers must
      # be isWALArchiver=false to avoid double-writing the WAL prefix.
      isWALArchiver: true
      parameters:
        # Name of the sibling ObjectStore CR (see base/objectstore.yaml).
        barmanObjectName: temporal-objectstore
        # Preserved from previous spec.backup.barmanObjectStore.serverName —
        # see cnpg-plugin-migration.md §9.1.
        #   v1 — abandoned 2026-05-03 (WAL-PVC-full deadlock). Lifecycle-pruned.
        #   v2 — opened 2026-05-03. Source of the 2026-05-08 GitOps DR drill.
        #   v3 — opened 2026-05-08 by GitOps DR drill (post-pvc-plumber-v3.1.0).
        #   v4 — opened 2026-06-11 (second full-cluster nuke, Longhorn V2
        #        rebuild; fresh initdb — v3 unrestorable, RustFS multipart bug).
        #   v5 — opened 2026-06-11 for the RE-nuke (SPDK cpu-mask validation
        #        run); v4 possibly dirtied by the aborted first attempt.
        #   v6 — opened 2026-06-12 after another initdb rebuild. Reusing v5
        #        failed Barman's required empty-archive check.
        # DO NOT change this value without bumping lineage in lockstep.
        # The companion overlays/recovery/bootstrap-patch.yaml MUST be
        # updated in the SAME commit (read FROM v(N-1) → write TO vN).
        serverName: temporal-database-v6
