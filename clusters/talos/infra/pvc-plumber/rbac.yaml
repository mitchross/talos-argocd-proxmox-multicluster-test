# RBAC for pvc-plumber v4 — cluster-wide read-only audit-reader role
# (used in all modes; operator currently runs PERMISSIVE, Phase 6 of
# docs/storage-architecture.md). Namespace-scoped write RBAC lives in
# rbac-volsync-writer.yaml.
#
# Strictly read-only. This ClusterRole also authorizes rc7's cluster-wide
# RS/RD LIST+WATCH (the new child watch that closes the reconcile-trigger
# gap). Permissive-mode WRITES are NOT granted here — they come from the
# separate `pvc-plumber:volsync-writer` ClusterRole (rbac-volsync-writer.yaml,
# Patch 7.7), bound per managed namespace. This audit-reader role stays
# read-only forever.
#
# (The label `pvc-plumber.io/mode: audit` on the objects below is legacy
# metadata and does not affect runtime mode, which is set by the
# PVC_PLUMBER_MODE env var on the Deployment.)
#
# Verb table (post Phase-3 tightening — three speculative rules removed):
#
#   pvcs, namespaces           : get, list, watch     (reconciler inputs)
#   replicationsources.*       : get, list, watch     (parity reporting)
#   replicationdestinations.*  : get, list, watch     (parity reporting)
#   externalsecrets.*          : get, list, watch     (presence checks)
#   clusterexternalsecrets.*   : get, list, watch     (ditto, cluster-scoped)
#
# Explicitly NOT granted in audit mode:
#
#   - Any create/update/patch/delete on managed resources.
#   - Secrets read (not needed; kopia is not called in audit mode).
#   - coordination.k8s.io Leases (leader election is forced off in audit).
#   - events.k8s.io/events. The v3.1/v4 reconciler does not call
#     EventRecorder (grep-verified in Phase 2.5 commit 028f376). If a
#     future change adds Event emission, this ClusterRole must add the
#     verbs at the same time — and the auditclient package documents
#     that EventRecorder bypasses the wrapper so it needs independent
#     mode gating.
#   - authentication.k8s.io/tokenreviews and
#     authorization.k8s.io/subjectaccessreviews. These are needed by
#     controller-runtime's webhook authentication path (Self*Review for
#     the apiserver→webhook auth proxy). Audit-mode main.go skips
#     webhook handler registration entirely (see Phase 2.5 commit
#     028f376) so the auth path is never reached. If startup logs ever
#     show "unable to perform SubjectAccessReview" warnings, add the
#     verbs back with proof.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-plumber:audit-reader
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    pvc-plumber.io/mode: audit
rules:
  # PVCs — the reconciler's primary watch.
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  # Namespaces — for reading volsync.backube/privileged-movers labels.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  # VolSync ReplicationSource + ReplicationDestination — parity comparison
  # between the v4 expected state and the cluster's current inline-Argo
  # resources.
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources", "replicationdestinations"]
    verbs: ["get", "list", "watch"]
  # ExternalSecrets (namespaced + cluster) — presence check for the shared
  # ClusterES-materialized volsync-kopia-repository Secret per namespace.
  - apiGroups: ["external-secrets.io"]
    resources: ["externalsecrets", "clusterexternalsecrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-plumber:audit-reader
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    pvc-plumber.io/mode: audit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-plumber:audit-reader
subjects:
  - kind: ServiceAccount
    name: pvc-plumber
    namespace: pvc-plumber
