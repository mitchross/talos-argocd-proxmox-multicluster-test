apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: talos-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # TEMPORARY VolSync migration escape hatch:
  # preserve per-Application compare-options annotations while Bound PVCs still
  # carry old immutable dataSourceRef values. Remove after affected PVCs are
  # recreated/restored and the ServerSideDiff=false annotations are removed.
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1compare-options
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
      revision: main
      directories:
      # project-nomad is intentionally one bundled app at manifests/apps/home/project-nomad.
      # Its child folders are resources, not generated apps.
      - path: clusters/talos/apps/*/*
  template:
    metadata:
      name: "talos-apps-{{index .path.segments 3}}-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;/manifests/apps/{{index .path.segments 3}}/{{.path.basename}}/base"
        argocd.argoproj.io/sync-wave: "6"
        # TEMPORARY pvc-plumber v4 migration mode:
        # Disables server-side diff for every my-apps-* Application while
        # any backed-up PVC in my-apps still has a legacy immutable
        # spec.dataSourceRef (e.g. *-backup) that diverges from Git
        # (*-dst). Argo v3.4.2's uncached compare path runs an SSA
        # dry-run that the API server rejects ("spec is immutable"),
        # producing a ComparisonError. App-level compare-options is
        # evaluated before any per-resource SSA dry-run dispatch, so
        # this fully bypasses the failing path. Client-side diff still
        # runs, and existing ignoreDifferences on PVC dataSourceRef/
        # dataSource/volumeName continue to mask the legitimate
        # immutable-spec drift. Remove after all v4-migrated PVCs are
        # DR-recreated and live dataSourceRef matches Git.
        argocd.argoproj.io/compare-options: ServerSideDiff=false
    spec:
      project: talos-apps
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        targetRevision: main
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      ignoreDifferences:
      # HTTPRoute, ExternalSecret, and PVC restore diff noise is ignored globally.
      # App-level PVC ignores are still required because
      # RespectIgnoreDifferences=true only strips app ignore rules during sync;
      # otherwise immutable restore fields keep retrying forever on Bound PVCs.
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/dataSource
        - /spec/dataSourceRef
        - /spec/volumeName
      # imagePullPolicy may differ from Git due to previous Kyverno admission mutation
      - group: apps
        kind: StatefulSet
        jqPathExpressions:
        - .spec.template.spec.containers[].imagePullPolicy
        - .spec.template.spec.initContainers[].imagePullPolicy
        - .spec.volumeClaimTemplates[].apiVersion
        - .spec.volumeClaimTemplates[].kind

      info:
      - name: 'Description'
        value: "Application: {{.path.basename}}"
