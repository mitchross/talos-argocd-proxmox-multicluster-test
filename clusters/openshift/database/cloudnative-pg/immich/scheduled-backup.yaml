apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: immich-daily-backup
  namespace: cloudnative-pg
spec:
  # CNPG schedule is 6-field cron — first field is SECONDS, not minute.
  # SNO backups run on the half-hour, offset from the Talos cluster's
  # on-the-hour schedule, so the two clusters never hit RustFS concurrently.
  schedule: "0 30 2 * * *"
  backupOwnerReference: self
  cluster:
    name: immich-database
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
