
---
# omnictl apply -f gpu-worker.yaml
#
# Proxmox Provider Config Options (Enhanced Build):
#   cores, sockets, memory, disk_size: Basic VM specs
#   storage_selector: CEL expression to select Proxmox storage
#   disk_ssd, disk_discard, disk_iothread, disk_cache, disk_aio: Disk performance
#   cpu_type: CPU type (host for GPU passthrough)
#   machine_type: q35 for native PCIe passthrough
#   numa, hugepages, balloon: GPU/HPC optimizations
#   additional_nics: Extra NICs for storage networks
#
# Note: qemu-guest-agent is auto-installed by the provider
#
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: proxmox-gpu-worker
spec:
  matchlabels: []
  autoprovision:
    providerid: proxmox
    kernelargs: []
    metavalues: []
    providerdata: |
      # CPU sized for GPU-only inference workloads — ComfyUI/llama-cpp do the
      # heavy work on the GPU; VM CPU only serves OS, containerd, NFS copies.
      cores: 16
      sockets: 1
      # Phase 1 right-size: 192G -> 128G. Capacity baseline 2026-05-04
      # showed GPU worker observed ~26.7 GiB of 188.2 GiB allocatable
      # while running llama-cpp + ComfyUI + nvidia operator stack. 128 GiB
      # leaves >4x headroom over current peak for model loads. CPU and
      # GPU passthrough configuration unchanged in Phase 1.
      memory: 131072
      # Single 800G disk — V1 layout restored 2026-06-12 (see worker.yaml for the
      # full story: V2/SPDK failed under full-DR load, returned to V1 engine).
      # Longhorn V1 data lives as files on the EPHEMERAL partition alongside
      # Talos system + images + pod ephemeral. Generous sizing matters here:
      # llama-cpp may legally use 50Gi ephemeral + 8Gi emptyDir (deployment
      # limits), vLLM adds a 16Gi emptyDir, CUDA images run 5-20G each, and
      # Longhorn replicas share the same partition. Models live on NFS.
      disk_size: 800
      network_bridge: vmbr1
      storage_selector: name == "ssdpool"
      # Disk performance (SSD/NVMe optimization)
      disk_ssd: true
      disk_discard: true
      disk_iothread: true
      disk_cache: none
      disk_aio: io_uring
      # GPU passthrough optimizations
      cpu_type: host
      machine_type: q35
      # numa=true is a HOST-side hint even with sockets:1 in the guest — keeps
      # the VM's memory on the same NUMA node as its vCPUs and (ideally) as
      # the PCIe lanes owning the GPUs. Matters on the 2-socket Xeon host.
      numa: true
      # hugepages: 1GB  # Requires host config: echo 256 > /proc/sys/vm/nr_hugepages
      balloon: false
      # GPU passthrough using Proxmox Resource Mappings (2x GPUs)
      pci_devices:
        - mapping: nvidia-gpu-1
          pcie: true
        - mapping: nvidia-gpu-2
          pcie: true
      # Single fiber uplink on the DL360 Gen9 host — LAN + storage traffic
      # (NFS/RustFS at 192.168.10.133) share it; no dedicated storage NIC/link.

# GPU Passthrough Setup:
# With enhanced provider, VM is pre-configured for GPU. Just:
# 1. Shut down the VM in Proxmox
# 2. Add GPU via Proxmox UI: Hardware → Add → PCI Device
# 3. Select your NVIDIA GPU (All Functions + PCI-Express)
# 4. Start the VM
# 5. GPU extensions are configured in the cluster template patches
