# Portable default RWO block class, backed by TrueNAS iSCSI (ZVOL) via the
# official csi.truenas.io driver (WebSocket API — works with TrueNAS 26).
#
# reclaimPolicy: Retain — OpenShift has NO VolSync/pvc-plumber backups, so a
# deleted PVC must not destroy its data. Orphaned datasets are cleaned up
# manually. datasetPath nests dynamic zvols under BigTank/k8s/iscsi so they can
# be group-snapshotted on TrueNAS for DR.
#
# NOTE: pool/datasetPath are proven for the NFS protocol (see the Talos core
# `truenas-nfs` class). For iSCSI they mirror the same pattern on the same
# csi.truenas.io driver — verify at first bootstrap that zvols land under
# BigTank/k8s/iscsi/ before treating it as load-bearing.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vanillax-local-rwo
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.truenas.io
parameters:
  protocol: "iscsi"
  pool: "BigTank"
  datasetPath: "k8s/iscsi/v"
  compression: "LZ4"
  sync: "STANDARD"
  volblocksize: "16K"
  iscsi.blocksize: "4096"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
# Dynamic RWX NFS class backed by TrueNAS NFS shares. Parameters mirror the
# proven Talos core `truenas-nfs` class so both clusters behave identically.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: truenas-nfs-csi
provisioner: csi.truenas.io
parameters:
  protocol: "nfs"
  pool: "BigTank"
  datasetPath: "k8s/nfs/v"
  compression: "LZ4"
  sync: "STANDARD"
  nfs.networks: "192.168.10.0/24"
  # TrueNAS CSI v1.0.4 supports map-all, not Democratic CSI's map-root.
  # Keep this explicit so ownership semantics cannot change on driver upgrade.
  nfs.mapAllUser: "root"
  nfs.mapAllGroup: "wheel"
  nfs.mountOptions: "hard,nfsvers=4.1,tcp,rsize=1048576,wsize=1048576,noatime,nconnect=16"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
