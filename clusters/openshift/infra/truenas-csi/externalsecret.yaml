# Creates the truenas-api-credentials Secret the driver reads (key: api-key)
# from the existing 1Password item democratic-csi-truenas (field apiKey).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-api-credentials
  namespace: truenas-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-api-credentials
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: democratic-csi-truenas
        property: apiKey
