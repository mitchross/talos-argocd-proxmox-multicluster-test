apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      # Open WebUI delegates LLM inference to vLLM; RAG embeddings run locally
      # on CPU in-pod. Keep it off the GPU node so both 3090s stay vLLM-only.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: feature.node.kubernetes.io/pci-0300_10de.present
                    operator: DoesNotExist
      containers:
      - name: open-webui
        # renovate: datasource=docker depName=ghcr.io/open-webui/open-webui
        # `main` and `cuda` are built from the same Open WebUI commit. This
        # standard image keeps local Whisper on CPU without shipping CUDA.
        image: ghcr.io/open-webui/open-webui:main@sha256:7f1b0a1a50cfbac23da3b16f96bc968fd757b26dc9e54e93813d61768ea9184e
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 500m
            memory: 1000Mi
            ephemeral-storage: "30Gi"
          limits:
            memory: 8000Mi
            ephemeral-storage: "40Gi"
        envFrom:
        - configMapRef:
            name: open-webui-configmap
        volumeMounts:
        - name: data
          mountPath: /app/backend/data
        # Health probes disabled - backend model loading can take several minutes
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: storage
