# WorkerDeployment — Temporal Worker Controller CRD
# (infrastructure/controllers/temporal-worker-controller/). Replaces the
# classic `apps/v1 Deployment` with a CR that automates Temporal Worker
# Versioning for safe blue/green rollouts of workflow worker code.
#
# NOTE: renamed from TemporalWorkerDeployment. The v1.7.0 controller
# deprecated the `Temporal*` kinds — its `deprecated-twd` handler is a
# NO-OP (logs a warning, does not reconcile spec changes). An image bump
# on the old kind applies to the CR but never rolls. Must be
# `kind: WorkerDeployment` to be reconciled. radar-ng migrated the same way.
#
# Concept refresher (full walkthrough lives in the news-reader repo at
# gitea.vanillax.me/vanillax/news-reader temporal/README.md):
#
#   "Worker Versioning" lets two builds of the same worker run side by side
#   on the same task queue. Each build has a build_id (the image tag).
#   Each @workflow.defn declares a versioning_behavior:
#     - AUTO_UPGRADE → in-flight workflows migrate to the new build_id
#                       on their next workflow task. Safe when the new
#                       code is history-compatible with the old.
#     - PINNED       → in-flight workflows stay on the build_id they
#                       started on until they complete (or call
#                       continue_as_new). Use this when workflow state
#                       shape or await ordering changes between releases.
#
# What this CR actually does on each image bump:
#   1. Controller sees spec.template.spec.containers[0].image changed.
#   2. Calls Temporal server's WorkerDeployment API to register the new
#      build_id (= the new image tag).
#   3. Creates a NEW apps/v1 Deployment named like "news-digest-v1.0.N"
#      with the new image. Both old and new Pods now poll the
#      news-digest task queue.
#   4. Tells the Temporal server to start ramping new workflows onto
#      the new build_id per the `rollout` steps below.
#   5. AUTO_UPGRADE in-flight workflows migrate as their next task hits.
#      PINNED in-flight workflows keep running on the old Deployment.
#   6. After 100% ramp + `sunset.scaledownDelay`, scales the old
#      Deployment to zero. After `sunset.deleteDelay`, deletes it.
#
# Watch the rollout live: temporal.vanillax.me → Deployments → news-digest.
#
# The worker code (gitea.vanillax.me/vanillax/news-reader, path:
# temporal/app/worker.py) enrolls itself in versioning via:
#   WorkerDeploymentConfig(
#     version=WorkerDeploymentVersion(
#       deployment_name=os.environ["TEMPORAL_DEPLOYMENT_NAME"],   # "news-digest"
#       build_id=os.environ["TEMPORAL_WORKER_BUILD_ID"],          # "v1.0.N"
#     ),
#     use_worker_versioning=True,
#   )
# The two env vars come from the controller — see env-injection note below.
apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: news-digest                           # → also the Temporal "deployment name"
  namespace: news-reader-temporal-worker
spec:
  replicas: 1                                 # per versioned Deployment; bump for HPA-less scale-out
  workerOptions:
    connectionRef:
      name: cluster-temporal                  # → temporal-connection.yaml
    temporalNamespace: default                # Temporal-server namespace (not k8s ns)
  rollout:
    # Progressive: ramp NEW workflows onto the new version in steps,
    # pausing between each so you can spot regressions before going 100%.
    # AUTO_UPGRADE workflows in-flight migrate to the new version naturally;
    # this ramp only controls "where do brand-new workflows start."
    # Homelab defaults — tune for prod (longer pauses, more steps).
    strategy: Progressive
    steps:
      - rampPercentage: 10                    # 10% of new workflows → new version
        pauseDuration: 2m                     # then hold for 2 minutes
      - rampPercentage: 50                    # then 50%
        pauseDuration: 5m                     # hold 5 minutes
      # the final 100% is implicit after the last step's pause
  sunset:
    # Once the new version owns 100% of NEW work, how long to keep the
    # old version's Pods alive so any still-running (typically PINNED)
    # workflows can finish on their original build_id; then how long
    # before the controller deletes the old Deployment.
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels:
        app: news-reader-temporal-worker
    spec:
      containers:
        - name: worker
          # Versioned tag — Renovate auto-PRs bumps when the monorepo build at
          # gitea.vanillax.me/vanillax/news-reader (path: temporal/) pushes
          # a new registry.vanillax.me/news-reader-temporal-worker:vX.Y.Z.
          # The Temporal Worker Controller turns each tag bump into a
          # new build_id + progressive worker rollout. Do NOT pin to
          # :latest here — the controller cannot tell two pushes apart.
          image: registry.vanillax.me/news-reader-temporal-worker:v1.0.5
          imagePullPolicy: Always
          # The controller injects four env vars into every Pod it creates:
          #   TEMPORAL_ADDRESS         — from spec.workerOptions.connectionRef
          #   TEMPORAL_NAMESPACE       — from spec.workerOptions.temporalNamespace
          #   TEMPORAL_DEPLOYMENT_NAME — from metadata.name ("news-digest")
          #   TEMPORAL_WORKER_BUILD_ID — from the image tag (the build_id)
          # Do not set those here — let the controller own them.
          #
          # App-level config (e.g. REDDIT_FRONTEND, LLAMA_URL) belongs in
          # the worker code at gitea.vanillax.me/vanillax/news-reader
          # temporal/app/worker.py — not in this manifest. The k8s spec
          # stays infra-only.
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
