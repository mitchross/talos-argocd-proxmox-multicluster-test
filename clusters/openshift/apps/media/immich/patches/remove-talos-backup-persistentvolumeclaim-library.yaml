apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: library
  namespace: immich
  labels:
    pvc-plumber.io/enabled:
    pvc-plumber.io/manage-volsync:
    pvc-plumber.io/tier:
    restore-policy:
  annotations:
    argocd.argoproj.io/compare-options:
spec:
  # 300Gi photo library → TrueNAS NFS (NAS-resident, keeps it off the node-local
  # thin pool). Everything else on this cluster defaults to local LVM block.
  storageClassName: truenas-nfs-csi
  dataSourceRef:
