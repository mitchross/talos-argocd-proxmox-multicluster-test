apiVersion: apps/v1
kind: Deployment
metadata:
  name: perplexica
  namespace: perplexica
  labels:
    app: perplexica
spec:
  replicas: 1
  strategy:
    type: Recreate
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: perplexica
  template:
    metadata:
      labels:
        app: perplexica
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "opentelemetry/default"
    spec:
      # Seed /data/config.json on every start from the ConfigMap. If the
      # file is missing (fresh PVC) we write the seed verbatim. If it
      # exists we merge just `modelProviders` in-place so user UI
      # preferences (theme, personalization) aren't stomped on each
      # deploy — model-provider list is authoritative from git, everything
      # else stays user-controlled.
      initContainers:
        - name: seed-config
          # Alpine with inline `apk add jq` because the upstream jq image
          # (ghcr.io/jqlang/jq) is distroless and has no shell — we need
          # /bin/sh for the merge logic below.
          image: alpine:3.24
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache jq >/dev/null
              SEED=/seed/config.json
              DEST=/data/config.json
              mkdir -p /data
              if [ ! -s "$DEST" ]; then
                echo "[seed] fresh PVC, writing config.json verbatim"
                cp "$SEED" "$DEST"
              else
                echo "[seed] merging modelProviders + search from seed into existing config.json"
                jq --slurpfile seed "$SEED" \
                   '.modelProviders = $seed[0].modelProviders
                    | .search = $seed[0].search' \
                   "$DEST" > "$DEST.tmp"
                mv "$DEST.tmp" "$DEST"
              fi
              echo "[seed] done. providers now:"
              jq -r '.modelProviders[] | "  - \(.name) (\(.type)) — \(.chatModels | length) models"' "$DEST"
          volumeMounts:
            - name: seed
              mountPath: /seed
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            # apk needs a writable root FS to unpack jq into /usr/bin.
            # Still no privilege escalation, all caps dropped.
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
      containers:
        - name: perplexica
          # Upstream renamed the project Perplexica -> Vane. The old
          # `itzcrazykns1337/perplexica` repo is frozen at v1.12.0; all new
          # releases ship from `itzcrazykns1337/vane`. The Dockerfile also
          # moved WORKDIR from /home/perplexica -> /home/vane, so the PVC
          # mountPath below had to follow.
          #
          # Why the bump: v1.12.0 has no guard against stuffing scraped page
          # content into the agent's tool-message history across iterations,
          # so a single "quality" search could push the prompt past 2M tokens
          # and explode llama-cpp's 64K ctx window. v1.12.2 adds embedding-
          # based result filtering + chunked context management that keeps
          # prompts bounded.
          #
          # Backend model: this app selects the canonical vLLM `qwen3.6-27b`
          # served-model-name from config.json. vLLM currently caps context at
          # 64K via --max-model-len; the embedding result-filter keeps prompts
          # under that ceiling.
          image: itzcrazykns1337/vane:slim-v1.12.2@sha256:d2878cf9c91962aa3fc053b59bc9b89adcbdcaeb7ee36b54906e853464b2c190
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: SEARXNG_API_URL
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: OPENAI_BASE_URL
              value: "http://vllm-service.vllm.svc.cluster.local:8080/v1"
            - name: OPENAI_API_KEY
              value: "sk-no-key-required"
          volumeMounts:
            - name: data
              mountPath: /home/vane/data
          # `/` is Next.js SSR — under load (embedding filter over 50+ search
          # results + Playwright/Chromium scraping + LLM streaming) it can
          # easily exceed the 1s default probe timeout. Observed: kubelet
          # killed the container mid-research with "context deadline
          # exceeded" on v1.12.2. Give it 10s per probe and 6 failures before
          # declaring the container dead (~3m of blocking tolerated) so a
          # long-running search doesn't self-destruct.
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          # v1.12.2 bundles Playwright + Chromium for the new scraper and
          # runs @xenova/transformers in-process for the embedding-based
          # result filter. Chromium alone wants 300-500MiB resident; add
          # Node + embedding inference for N chunks and 512Mi gets wiped
          # out fast.
          #
          # Bumped from 2 CPU / 2Gi: the in-process embedding rerank over
          # 50+ scraped results is CPU-bound and is the main retrieval-quality
          # bottleneck (model size is not — we're already on the best model).
          # The GPU node has 12 cores / 128Gi, so give the rerank real CPU and
          # headroom for Chromium rather than starving the event loop (which
          # previously tripped the liveness probe mid-search). For a bigger
          # win, point Vane's embeddings at an external endpoint instead of
          # in-process xenova — see docs/3090-llm-optimization.md.
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: perplexica-data
        - name: seed
          configMap:
            name: perplexica-config-seed
            items:
              - key: config.json
                path: config.json
