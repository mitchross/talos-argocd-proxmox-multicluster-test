# OpenTelemetry Operator observability (OPTIONAL) — ServiceMonitor split out of
# the OTel operator core app.
#
# Bootstrap principle: a bootstrap-critical app (opentelemetry-operator, Wave 5)
# must NOT render monitoring.coreos.com CRs. The OTel operator and
# kube-prometheus-stack (the monitoring.coreos.com CRD owner) are BOTH Wave 5,
# so a chart-rendered ServiceMonitor raced the CRD install. This app carries the
# operator's ServiceMonitor and syncs at Wave 6 — strictly AFTER monitoring — so
# it never gates storage / controller / restore bootstrap.
# SkipDryRunOnMissingResource is acceptable HERE (observability only) as a
# safety net; OTel operator core does not need it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-operator-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/opentelemetry-operator-observability
  destination:
    server: https://kubernetes.default.svc
    namespace: opentelemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    # Observability-only escape hatch: if monitoring CRDs are momentarily absent
    # this app still syncs without wedging. Core apps must NEVER rely on this.
    - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
