apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-database
spec:
  bootstrap:
    recovery:
      source: temporal-recovery-source
      # No recoveryTarget -> restore to latest available WAL.
      # Prior dated targetTime "2026-04-16T23:59:59Z" was a DR landmine
      # (predates earliest archived WAL on -v1) and was removed 2026-05-03
      # alongside the v1->v2 lineage bump. If a future PITR is needed,
      # set targetTime to a value that is verifiably present in the
      # externalClusters serverName's wals/ prefix on RustFS.
  # Plugin-shape externalClusters (replaces the deprecated in-tree
  # barmanObjectStore field on externalClusters[]; removed in CNPG 1.30.0).
  # Reuses the prod ObjectStore CR (base/objectstore.yaml) — the only thing
  # that differs from the prod path is the serverName, which selects the
  # PRIOR lineage subtree on the same RustFS bucket. Migration plan:
  # docs/plans/cnpg-plugin-migration.md.
  externalClusters:
    - name: temporal-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          # Reuse the prod ObjectStore (same bucket, same creds, same
          # endpoint). Only serverName changes between live writes and
          # recovery reads.
          barmanObjectName: temporal-objectstore
          # Previous lineage to recover FROM. DO NOT change without
          # bumping recovery target lineage. See cnpg-plugin-migration.md
          # §9.1.
          #   v1 — abandoned 2026-05-03 (WAL-PVC-full).
          #   v2 — source for the 2026-05-08 GitOps DR drill (this commit
          #        bumped base/cluster.yaml to v3 AND flipped this serverName
          #        from v1 → v2 in lockstep).
          #   v3 — written 2026-05-08 → 2026-06-11; unrestorable today
          #        (RustFS multipart bug).
          #   v4 — short-lived lineage of the aborted first 2026-06-11
          #        rebuild attempt.
          #   v5 — lineage superseded by the 2026-06-12 rebuild; kept at N-1
          #        relative to the active v6 write target.
          serverName: temporal-database-v5
