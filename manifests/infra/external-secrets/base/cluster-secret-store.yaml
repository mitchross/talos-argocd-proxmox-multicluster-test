apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: 1password
  namespace: external-secrets
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    onepassword:
      connectHost: http://onepassword-connect.1passwordconnect.svc.cluster.local:8080
      vaults:
        homelab-prod: 1
        # homelab-lab carries the Cloudflare lab config (cloudflared-proxmox:
        # api-token used by the cloudflare-cluster-issuer for vanillax.xyz DNS-01).
        # NOTE: the 1Password Connect integration must be granted access to the
        # homelab-lab vault, or ESO returns "key not found" for its items.
        homelab-lab: 2
      auth:
        secretRef:
          connectTokenSecretRef:
            name: 1passwordconnect
            key: token
            namespace: external-secrets
