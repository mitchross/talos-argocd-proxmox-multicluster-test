---
# Cluster-scoped MutatingAdmissionPolicy + Binding for the operator-free
# VolSync backup safety interlock. Injects `wait-for-rustfs` into every
# `volsync-src-*` / `volsync-dst-*` mover Job — fail-closed on hard-
# unreachable RustFS backend.
#
# Wave 2: same as pvc-plumber. They coexist safely during the migration
# (MAP targets Jobs; pvc-plumber webhooks target PVCs — no admission
# conflict). Once every backup-labeled PVC has been migrated to chart-
# managed VolSync (per docs/research/pvc-backup-simplification/migration-plan.md),
# pvc-plumber gets decommissioned and this Application is the only thing
# left in the backup-safety path.
#
# CreateNamespace=false because the MAP/Binding are cluster-scoped — no
# namespace is created or needed; spec.destination.namespace below is
# nominal (argocd ns) and not used by the rendered objects.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: volsync-backup-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/volsync-backup-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
