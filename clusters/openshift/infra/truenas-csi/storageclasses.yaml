# Default RWO block class — backed by NODE-LOCAL LVM (LVMS/topolvm) on the
# single node's second NVMe SSD (deviceClass vg1, see infra/lvm-storage).
#
# WHY local instead of TrueNAS iSCSI: on a single-node cluster there is no
# benefit to network block storage, and TrueNAS iSCSI proved fragile (the
# target service did not survive a NAS reboot/lockup and SendTargets discovery
# wedged — 2026-06 incident). Node-local LVM is faster, has no network/NAS
# dependency, and supports CSI snapshots/clones. Keeping the SAME class name
# (`vanillax-local-rwo`) means every app + StatefulSet volumeClaimTemplate that
# references it migrates with zero per-app edits — delete the old (iSCSI) PVC
# and it re-provisions here on recreate. Bulk/NAS-resident data (e.g. photos)
# should use `truenas-nfs-csi` explicitly.
#
# Thin pool (overprovisionRatio 10 in the LVMCluster) → volumes provision thin;
# real SSD usage is what counts, so original PVC sizes need no downsizing.
# reclaimPolicy Delete: lab box, no backups, recreate-fresh is the model.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vanillax-local-rwo
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: topolvm.io
parameters:
  topolvm.io/device-class: "vg1"
  csi.storage.k8s.io/fstype: "xfs"
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# Dynamic RWX NFS class backed by TrueNAS NFS shares. Parameters mirror the
# proven Talos core `truenas-nfs` class so both clusters behave identically.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: truenas-nfs-csi
provisioner: csi.truenas.io
parameters:
  protocol: "nfs"
  pool: "BigTank"
  datasetPath: "k8s/nfs/v"
  compression: "LZ4"
  sync: "STANDARD"
  nfs.networks: "192.168.10.0/24"
  # TrueNAS CSI v1.0.4 supports map-all, not Democratic CSI's map-root.
  # Keep this explicit so ownership semantics cannot change on driver upgrade.
  nfs.mapAllUser: "root"
  nfs.mapAllGroup: "wheel"
  nfs.mountOptions: "hard,nfsvers=4.1,tcp,rsize=1048576,wsize=1048576,noatime,nconnect=16"
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
