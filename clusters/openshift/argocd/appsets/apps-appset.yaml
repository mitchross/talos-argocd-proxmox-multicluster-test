apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openshift-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        revision: main
        directories:
          - path: clusters/openshift/apps/*/*
  template:
    metadata:
      name: "openshift-apps-{{index .path.segments 3}}-{{.path.basename}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;/manifests/apps/{{index .path.segments 3}}/{{.path.basename}}/base"
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: openshift-apps
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        targetRevision: main
        path: "{{.path.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - Replace=false
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
