apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-hf-cache
  namespace: vllm
  labels:
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "HuggingFace model cache (safetensors downloads); rebuildable by re-download on pod start"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: vanillax-local-rwo
