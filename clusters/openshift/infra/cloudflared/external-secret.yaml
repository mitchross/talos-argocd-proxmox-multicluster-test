apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-token
  namespace: cloudflared
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: cloudflared-token
    creationPolicy: Owner
  data:
    # NUC-LAB is a dashboard-managed (remotely-configured) tunnel, so cloudflared
    # runs with --token. Store the connector token (the eyJhIjoi... string from
    # the Cloudflare tunnel "install" command) in 1Password item cloudflared-sno,
    # field tunnel-token.
    - secretKey: tunnel-token
      remoteRef:
        key: cloudflared-sno
        property: tunnel-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
