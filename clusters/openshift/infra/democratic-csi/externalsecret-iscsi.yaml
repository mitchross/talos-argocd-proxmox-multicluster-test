apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-iscsi-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-iscsi-config
    creationPolicy: Owner
    # The driver config body lives in ConfigMap `truenas-iscsi-config-tmpl`
    # (non-secret, in Git). ESO renders it — substituting the {{ .apiKey }}
    # placeholder with the key fetched below — into key `driver-config-file.yaml`
    # of this Secret, which the driver mounts via existingConfigSecret.
    template:
      engineVersion: v2
      templateFrom:
        - target: Data
          configMap:
            name: truenas-iscsi-config-tmpl
            items:
              - key: driver-config-file.yaml
                templateAs: Values
  data:
    # The ONLY secret: the TrueNAS API key (1Password item democratic-csi-truenas,
    # field apiKey). iSCSI + NFS share the same key.
    - secretKey: apiKey
      remoteRef:
        key: democratic-csi-truenas
        property: apiKey
