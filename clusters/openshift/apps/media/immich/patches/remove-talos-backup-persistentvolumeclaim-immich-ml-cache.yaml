apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: immich-ml-cache
  namespace: immich
  labels:
    backup-exempt:
  annotations:
    storage.vanillax.dev/backup-exempt-reason:
# Regenerable ML model cache — node-local local-path, no TrueNAS dependency.
spec:
  storageClassName: local-path
