manager:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # Bootstrap principle: a bootstrap-critical app must NOT render
  # monitoring.coreos.com CRs. The OTel operator syncs at Wave 5 — the SAME
  # wave as kube-prometheus-stack (the monitoring.coreos.com CRD owner) — so a
  # chart-rendered ServiceMonitor races the CRD install and can SyncFailed on a
  # fresh nuke. The operator's ServiceMonitor now lives in the separate
  # post-monitoring app `opentelemetry-operator-observability` (Wave 6); see
  # infrastructure/controllers/opentelemetry-operator-observability/.
  # Do NOT re-enable this here.
  serviceMonitor:
    enabled: false

admissionWebhooks:
  certManager:
    enabled: true
