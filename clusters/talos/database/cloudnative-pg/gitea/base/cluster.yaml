# Base CNPG Cluster manifest — NO bootstrap stanza.
# Overlays (overlays/initdb, overlays/recovery) supply the bootstrap
# via strategic-merge patch.
#
# serverName encodes the FORWARD write target (current lineage). On
# fresh-nuke recovery, set this to the NEXT lineage so post-restore
# backups don't append to the polluted current-lineage directory on S3.
# Bump this whenever you trigger a new recovery — keep in sync with the
# recovery overlay's externalClusters (which points at the PRIOR lineage).
#
# Plugin-mode backup config (replaces deprecated spec.backup.barmanObjectStore;
# removed in CNPG 1.30.0). The S3 destination + retention live on a sibling
# ObjectStore CR (base/objectstore.yaml). Migration plan:
# docs/plans/cnpg-plugin-migration.md.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
  labels:
    app: gitea
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  resources:
    requests:
      memory: 512Mi
      cpu: 250m
    limits:
      memory: 1Gi
  postgresql:
    parameters:
      shared_buffers: "128MB"
      max_wal_size: "512MB"
      wal_compression: "on"
    pg_hba:
      - host all all 0.0.0.0/0 md5
  storage:
    size: 20Gi
    storageClass: longhorn
  walStorage:
    size: 50Gi
    storageClass: longhorn
  enableSuperuserAccess: true
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      # Designates this Cluster as the active WAL writer for the referenced
      # ObjectStore. Keep at most one Cluster per ObjectStore as
      # isWALArchiver=true.
      isWALArchiver: true
      parameters:
        # Name of the sibling ObjectStore CR (see base/objectstore.yaml).
        barmanObjectName: gitea-objectstore
        # v4 lineage opened 2026-06-11 (second full-cluster nuke, Longhorn V2
        # rebuild). Same story as v3: Barman restore remains ABANDONED — RustFS
        # cannot serve MULTIPART objects ("encrypted object metadata is
        # incomplete"); all prior lineages are unrestorable, so gitea comes back
        # as a FRESH initdb DB on a clean prefix (a dirty prefix would fail
        # the WAL-archive empty check). v5 opened for the 2026-06-11 RE-nuke
        # (the SPDK cpu-mask validation run) since the v4 prefix may have been
        # dirtied by the aborted first attempt. Repos themselves are safe on
        # the restored gitea-shared-storage PVC. NOTE: until RustFS's multipart
        # bug is fixed, v5 base backups will be equally unreadable on restore.
        # v6 opened 2026-06-12 after Gitea was rebuilt again. Reusing v5 made
        # barman-cloud-check-wal-archive reject the new cluster because that
        # archive was already non-empty.
        # DO NOT change this value without bumping lineage in lockstep.
        serverName: gitea-database-v6
