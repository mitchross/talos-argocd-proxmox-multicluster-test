apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-database
spec:
  bootstrap:
    recovery:
      source: paperless-recovery-source
      database: paperless
      owner: paperless
      secret:
        name: paperless-app-secret
      # No recoveryTarget → restore to latest-WAL available on S3.
      # Our PITR target of pre-nuke (2026-04-16) is unreachable because
      # paperless's WAL archiving broke on 2026-03-26 (last available WAL).
      # We'll get paperless data as of 2026-03-26 instead of pre-nuke.
      # TODO: investigate WHY WAL archiving stopped — check ScheduledBackup
      # + CNPG operator logs around that date post-restore.
  # Plugin-shape externalClusters (replaces the deprecated in-tree
  # barmanObjectStore field on externalClusters[]; removed in CNPG 1.30.0).
  # Reuses the prod ObjectStore CR (base/objectstore.yaml) — the only thing
  # that differs from the prod path is the serverName, which selects the
  # PRIOR lineage subtree on the same RustFS bucket. Migration plan:
  # docs/plans/cnpg-plugin-migration.md.
  externalClusters:
    - name: paperless-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          # Reuse the prod ObjectStore (same bucket, same creds, same
          # endpoint). Only serverName changes between live writes and
          # recovery reads.
          barmanObjectName: paperless-objectstore
          # Previous lineage to recover FROM. DO NOT change without
          # bumping recovery target lineage. See cnpg-plugin-migration.md
          # §9.1. v3 is the lineage superseded by the 2026-06-12 rebuild
          # (base writes to v4).
          # CAUTION: all prior base backups are multipart and unreadable until
          # the RustFS multipart bug is fixed — kept at N-1 by convention.
          serverName: paperless-database-v3
