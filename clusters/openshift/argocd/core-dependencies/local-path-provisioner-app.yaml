apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
  namespace: argocd
  annotations:
    # Wave 1 alongside the other storage. The MachineConfig it ships REBOOTS
    # the single node once on first apply (API unavailable ~5 min); that is
    # expected during initial bootstrap and Argo resumes afterward.
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/manifest-generate-paths: ".;/clusters/openshift/infra/local-path-provisioner"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openshift-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/openshift/infra/local-path-provisioner
  destination:
    server: https://kubernetes.default.svc
    namespace: local-path-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
