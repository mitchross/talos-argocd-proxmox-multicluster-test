apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-nfs-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-nfs-config
    creationPolicy: Owner
    # Only the apiKey is secret; everything else is non-sensitive and lives in
    # Git. ESO renders the full driver-config-file.yaml (mounted via
    # driver.existingConfigSecret in values-nfs.yaml) with the key injected.
    template:
      engineVersion: v2
      data:
        driver-config-file.yaml: |
          driver: freenas-api-nfs
          instance_id:
          httpConnection:
            protocol: https
            host: 192.168.10.133
            port: 443
            apiKey: "{{ .apiKey }}"
            allowInsecure: true
          zfs:
            datasetParentName: BigTank/k8s/nfs/v
            detachedSnapshotsDatasetParentName: BigTank/k8s/nfs/s
            datasetEnableQuotas: true
            datasetPermissionsMode: "0777"
            datasetPermissionsUser: 0
            datasetPermissionsGroup: 0
          nfs:
            shareHost: 192.168.10.133
            shareAlldirs: false
            shareAllowedNetworks:
              - 192.168.10.0/24
            shareMaprootUser: root
            shareMaprootGroup: root
  data:
    - secretKey: apiKey
      remoteRef:
        key: democratic-csi-truenas
        property: apiKey
