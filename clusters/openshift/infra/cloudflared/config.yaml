# Ingress routes only. Credentials + tunnel ID come from --token (TUNNEL_TOKEN),
# so no `tunnel:` / `credentials-file:` here. This tunnel (NUC-LAB) is locally
# managed, so these local ingress rules are the source of truth for routing.
#
# EXPLICIT hostname allowlist — deliberately NOT a "*.vanillax.xyz" wildcard.
# Internal-only apps (ArgoCD, the AI stack, gitea, ...) share the same
# openshift-gateway, so a wildcard rule would expose them publicly the moment
# any DNS record resolved (e.g. an accidental Cloudflare wildcard). This list
# mirrors Talos's internal/external gateway split: only HTTPRoutes labeled
# `external-dns: "true"` belong here. Adding an external app = label the route
# AND add its hostname below. CI (validate-cluster-layout.sh) enforces that
# this list exactly mirrors the labeled routes.
#
# Each rule forwards to the openshift-gateway HTTPS listener at the MetalLB
# address 192.168.10.230:443. originServerName pins SNI to the app hostname so
# the Gateway's *.vanillax.xyz TLS listener matches; noTLSVerify because
# Cloudflare terminates public TLS at the edge. HTTPRoutes do per-host routing.
metrics: 0.0.0.0:2000
no-autoupdate: true
ingress:
  - hostname: excalidraw.vanillax.xyz
    service: https://192.168.10.230:443
    originRequest:
      noTLSVerify: true
      originServerName: excalidraw.vanillax.xyz
  - hostname: search.vanillax.xyz
    service: https://192.168.10.230:443
    originRequest:
      noTLSVerify: true
      originServerName: search.vanillax.xyz
  - hostname: vanillax.xyz
    service: https://192.168.10.230:443
    originRequest:
      noTLSVerify: true
      originServerName: vanillax.xyz
  - service: http_status:404
