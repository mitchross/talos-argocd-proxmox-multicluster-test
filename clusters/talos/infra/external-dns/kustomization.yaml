apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-dns

resources:
  - ns.yaml
  - cloudflare-external-secret.yaml
  - technitium-external-secret.yaml
  - technitium-egress-policy.yaml

helmCharts:
  - name: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns
    version: 1.21.1 # renovate: helm=kubernetes-sigs/external-dns
    releaseName: external-dns
    namespace: external-dns
    valuesFile: values.yaml
  - name: external-dns
    repo: https://kubernetes-sigs.github.io/external-dns
    version: 1.21.1 # renovate: helm=kubernetes-sigs/external-dns
    releaseName: external-dns-technitium
    namespace: external-dns
    valuesFile: values-technitium.yaml
