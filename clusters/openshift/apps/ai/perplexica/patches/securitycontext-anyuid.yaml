# OpenShift picks the LEAST-privileged SCC that admits a pod, so even with the
# perplexica-anyuid RoleBinding present, the pod ran under restricted-v2 with a
# random assigned UID (1001080000) that owns none of the image's dirs → the app
# got "Unable to open log: Permission denied". Pinning the image's own UID/GID
# (1000, the `vane` user) forces anyuid selection AND runs the app as the user
# that owns its files; fsGroup makes the local-path PVC group-writable. (2026-06-17)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perplexica
  namespace: perplexica
spec:
  template:
    spec:
      # ndots:2 — the seed-config init does `apk add jq`, and OpenShift injects
      # `options ndots:5` + extra node search suffixes (sno-ai-lab.vanillax.xyz,
      # lan) into resolv.conf. With ndots:5 alpine's musl `apk` resolver treats
      # dl-cdn.alpinelinux.org (3 dots) as non-FQDN, walks the search list, and
      # fails → "DNS: no address for host". ndots:2 makes the 3-dot CDN resolve
      # directly while 0/1-dot in-cluster service names still use search. (Talos
      # works because its pods get a leaner resolv.conf with no node suffixes.)
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      # Run as root: forces privileged SCC selection (restricted-v2/anyuid reject
      # UID 0), AND the seed-config init's `apk add` REQUIRES root. Root also
      # writes the app log fine. fsGroup keeps the local-path PVC group-owned.
      securityContext:
        runAsUser: 0
        fsGroup: 1000
