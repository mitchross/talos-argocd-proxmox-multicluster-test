# OpenShift picks the LEAST-privileged SCC that admits a pod, so even with the
# perplexica-anyuid RoleBinding present, the pod ran under restricted-v2 with a
# random assigned UID (1001080000) that owns none of the image's dirs → the app
# got "Unable to open log: Permission denied". Pinning the image's own UID/GID
# (1000, the `vane` user) forces anyuid selection AND runs the app as the user
# that owns its files; fsGroup makes the local-path PVC group-writable. (2026-06-17)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perplexica
  namespace: perplexica
spec:
  template:
    spec:
      # Run as root: forces anyuid SCC selection (restricted-v2 forbids UID 0),
      # AND the seed-config init does `apk add jq` which REQUIRES root. Root also
      # writes the app log fine. fsGroup keeps the local-path PVC group-owned.
      # (1000 was wrong — it broke the apk init.) (2026-06-17)
      securityContext:
        runAsUser: 0
        fsGroup: 1000
