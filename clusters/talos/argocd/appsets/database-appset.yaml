apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: database
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # Preserve skip-reconcile annotation during DR recovery
  # Without this, the ApplicationSet controller strips manual annotations
  ignoreApplicationDifferences:
  - jsonPointers:
    - /metadata/annotations/argocd.argoproj.io~1skip-reconcile
    # TEMPORARY VolSync migration escape hatch for redis-instance:
    # preserve a manual ServerSideDiff=false annotation while its Bound PVC
    # still carries an old immutable dataSourceRef value. Remove after the PVC
    # is recreated/restored and the annotation is removed.
    - /metadata/annotations/argocd.argoproj.io~1compare-options
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
      revision: main
      files:
      - path: clusters/talos/database/*/*/.argocd/config.json
  template:
    metadata:
      name: "{{.applicationName}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;/manifests/database"
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
        # Server-Side Diff + IncludeMutationWebhook closes the CNPG drift gap.
        # CNPG operator uses k8s API Update (not Apply) and owns zero fields
        # under SSA, so managedFieldsManagers below strips nothing. SSD asks
        # the API server for a dry-run apply and compares predicted-live vs
        # actual-live — CRD defaults (enablePDB, failoverDelay, encoding, ...)
        # apply to both sides and disappear from the diff. IncludeMutationWebhook
        # also pipes through CNPG's mutating admission webhook so webhook-injected
        # defaults are captured too. Requires controller.diff.server.side=true
        # in argocd-cmd-params-cm (see ../argocd/values.yaml configs.params).
        argocd.argoproj.io/compare-options: ServerSideDiff=true,IncludeMutationWebhook=true
      labels:
        app.kubernetes.io/part-of: database
    spec:
      project: "{{.project}}"
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        targetRevision: main
        path: "{{.sourcePath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      # NOTE: .status ignored globally by ArgoCD 3.0+ — only non-status fields listed
      #
      # DO NOT add .spec.bootstrap or .spec.externalClusters as jsonPointers here.
      # RespectIgnoreDifferences=true + ServerSideApply STRIPS fields named in
      # jsonPointers during apply — would block the overlay-based DR flow from
      # ever reaching the live Cluster. Each DB's root kustomization.yaml
      # switches between overlays/initdb and overlays/recovery; ArgoCD must
      # fully apply that. CNPG ignores spec.bootstrap on existing Clusters
      # semantically (it's creation-time only), so post-recovery drift
      # between git and live is cosmetic — the extra sync churn is worth it
      # for correctness. ExternalSecret and PVC restore diff noise is ignored
      # globally.
      #
      # `managedFieldsManagers: [manager]` ignores drift on fields whose SSA
      # owner is the CNPG operator (manager name `manager`). The operator
      # injects ~20 spec defaults post-create — affinity, enablePDB,
      # primaryUpdateStrategy, probes, replicationSlots, postgresql defaults
      # (archive_mode, max_replication_slots, wal_keep_size, log_*,
      # ssl_min/max_protocol_version, etc.), smartShutdownTimeout,
      # postgresGID/UID, storage.resizeInUseVolumes, etc. None of these are
      # written by ArgoCD (manager `argocd-controller`), so ignoring the
      # operator's manager clears the drift without enumerating each path.
      # Fields ArgoCD writes (instances, imageName, plugins, storage size,
      # postgresql.parameters we set explicitly, monitoring.enablePodMonitor,
      # bootstrap when present via overlay) remain fully compared. This is
      # the SSA-native ownership-based diff strategy. Unlike jsonPointers it
      # does NOT cause SSA strip on apply.
      ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        jsonPointers:
        - /spec/dataSource
        - /spec/dataSourceRef
        - /spec/volumeName
      - group: postgresql.cnpg.io
        kind: Cluster
        managedFieldsManagers:
        - manager
        jsonPointers:
        - /metadata/generation
