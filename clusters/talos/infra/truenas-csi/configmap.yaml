apiVersion: v1
kind: ConfigMap
metadata:
  name: truenas-csi-config
data:
  # Keys ARE the driver's env-var names: both the controller Deployment and the
  # node DaemonSet consume this whole ConfigMap via envFrom (single source —
  # adding a var here reaches both without touching driver.yaml).
  # TrueNAS SCALE 26 JSON-RPC 2.0 WebSocket API.
  TRUENAS_URL: "wss://192.168.10.133/api/current"
  # TrueNAS currently uses a private/self-signed certificate on this endpoint.
  TRUENAS_INSECURE_SKIP_VERIFY: "true"
  TRUENAS_DEFAULT_POOL: "BigTank"
  TRUENAS_NFS_SERVER: "192.168.10.133"
  # Required by the shared upstream driver config even though this rollout does
  # not create an iSCSI StorageClass or permit TCP 3260 through Cilium.
  TRUENAS_ISCSI_PORTAL: "192.168.10.133:3260"
  TRUENAS_ISCSI_IQN_BASE: "iqn.2000-01.io.truenas"

