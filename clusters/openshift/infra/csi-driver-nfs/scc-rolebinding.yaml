# The upstream csi-driver-nfs chart does not create OpenShift SCCs. Both the
# controller and the node DaemonSet use hostNetwork + hostPath and the node
# plugin mounts with privileged/SYS_ADMIN, so restricted-v2 rejects every pod
# (FailedCreate on the ReplicaSet/DaemonSet — the namespace looks "Synced" in
# Argo while zero pods exist and all nfs.csi.k8s.io mounts fail with
# "driver name not found in the list of registered CSI drivers").
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: csi-nfs-privileged
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: csi-nfs-controller-sa
    namespace: csi-driver-nfs
  - kind: ServiceAccount
    name: csi-nfs-node-sa
    namespace: csi-driver-nfs
