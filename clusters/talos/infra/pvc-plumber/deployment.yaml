# pvc-plumber v4 — Deployment, v4.0.1 (final/stable) image (Phase 6 of
# git history (v4 PRD, pruned 2026-06-13), cutover sequence per
# git history (v4 cutover doc, pruned 2026-06-13) §9).
#
# Single replica. Leader election forced off by the binary in permissive
# (and audit) modes. No webhook server — Patch 6.7-wire gates
# webhook registration on `!runsV4Reconciler(mode)`, and permissive +
# audit both route to v4, so the webhook server is never started
# under any v4 mode. Therefore no TLS cert volume, no init container,
# no /tmp/k8s-webhook-server.
#
# Image: pinned to v4.0.1 (git tag) → docker tag 4.0.1
# (docker/metadata-action@v5 strips the leading `v`). v4.0.1 is a FINAL
# non-RC patch on v4.0.0 that adds the NAMESPACE WRITE GATE: even with both
# PVC fuse labels, the operator will not create/update/delete RS/RD in a
# namespace that lacks pvc-plumber.io/managed-namespace="true" (action
# skipped-namespace-not-managed, zero ops; also blocks tier=disabled
# teardown). This is the software boundary that makes a DRY cluster-wide
# RS/RD write ClusterRoleBinding safe.
#
# RBAC REFACTOR STILL PENDING: this manifest still uses per-namespace
# RoleBindings (rbac-volsync-writer.yaml). The flip to a single
# ClusterRoleBinding happens ONLY AFTER this v4.0.1 gate is live and
# verified — never have cluster-wide RBAC without the gate. The three
# managed namespaces (nginx-example, homepage-dashboard, karakeep) carry
# the pvc-plumber.io/managed-namespace label as of the Phase-1 commit.
#
# The SHA-pin is the v4.0.1 release digest published by
# .github/workflows/release.yaml on 2026-05-30 (Release run 26676186207).
# Built from mitchross/pvc-plumber commit da40246
# (fix(v4): require managed namespace before VolSync writes), which sits on
# top of v4.0.0 / commit 3c40a1f.
#
# The fix history below describes what shipped through rc6→rc7 and is now
# part of v4.0.0 final:
#
# rc7 fixes the reconcile-TRIGGER gap that rc6's label fix exposed. rc6
# made operator-driven RS/RD Creates valid, but the v4 reconciler still
# watched PersistentVolumeClaims ONLY — so when Argo pruned the inline
# RS/RD of nginx-example/storage the PVC itself never changed, no event
# fired, the operator never reconciled, and the PVC sat with no backup
# chain for ~15h while /audit served a stale "already-matches" snapshot.
# rc7 adds a ReplicationSource/ReplicationDestination watch that re-
# enqueues the owning PVC on child create/delete/spec-change (delete is
# the load-bearing event), a periodic self-heal requeue for write-
# eligible PVCs, a partial inline-argo needs-human-review guard (never
# create a child that would fight Argo over a single name), and per-
# entry /audit staleness so a stalled reconciler can't look fresh. The
# two-gate write fuse (enabled + manage-volsync) and inline-argo
# observe-only semantics are unchanged. Full incident write-up at
# git history (nginx-canary incident doc, pruned).
#
# Operator-side write RBAC for VolSync RS/RD is provided by
# rbac-volsync-writer.yaml (Patch 7.7): ClusterRole
# pvc-plumber:volsync-writer plus per-namespace RoleBindings. The
# operator's `pvc-plumber:audit-reader` ClusterRoleBinding remains
# read-only cluster-wide; writes happen only in namespaces with an
# explicit volsync-writer RoleBinding. rc7's new RS/RD watch performs a
# cluster-wide LIST+WATCH on replicationsources/replicationdestinations,
# authorized by audit-reader's cluster-wide get/list/watch (verified
# 2026-05-28); writes stay namespace-scoped via volsync-writer. The
# adopt CLI uses a separate
# `pvc-plumber-adopt` ServiceAccount with its own canary-scoped RBAC
# (rbac-adopt.yaml).
#
# The Argo Application at ../argocd/apps/core-dependencies/pvc-plumber-app.yaml
# has automated sync DISABLED. The image pin alone does not trigger
# a deployment — a manual sync is required.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pvc-plumber
  namespace: pvc-plumber
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    # Informational only — runtime mode is set by PVC_PLUMBER_MODE env
    # below. Brought in line with the real mode during the v4.0.2 image
    # roll (2026-06-10), closing migration-readiness §7.
    pvc-plumber.io/mode: permissive
spec:
  replicas: 1
  # No RWO PVC, so Recreate vs RollingUpdate doesn't matter, but pinning
  # to Recreate keeps the rollout pattern consistent with every other
  # operator-style Deployment in the repo.
  strategy:
    type: Recreate
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: pvc-plumber
      app.kubernetes.io/component: backup-restore-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pvc-plumber
        app.kubernetes.io/component: backup-restore-operator
        # Informational only — runtime mode is PVC_PLUMBER_MODE env.
        # Updated alongside the v4.0.2 image roll (pod restarts anyway).
        pvc-plumber.io/mode: permissive
    spec:
      serviceAccountName: pvc-plumber
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          # Pinned to the immutable digest published by the operator
          # repo's release.yaml workflow on 2026-06-10 (tag v4.0.2,
          # commit d2f7f02). The tag value is informational only — the
          # digest is what kubelet pulls. This is the multi-arch manifest
          # list digest (linux/amd64 + linux/arm64), read from ghcr's
          # Docker-Content-Digest at release time. v4.0.2 = 2026-06-09
          # review hardening: RS schedule-drift detection (rs_schedule in
          # /audit), manual tier renders trigger.manual (was daily cron),
          # default-tier + inert-v5-annotation disclosures. (Prior pin:
          # 4.0.1 @sha256:721d770…, commit da40246.)
          image: ghcr.io/mitchross/pvc-plumber:4.0.2@sha256:2539ae6e1f387ca9a734a0ba2bb176b696dd74e4a832d3b6bcd3ecea27f47b7d
          imagePullPolicy: IfNotPresent
          command: ["/pvc-plumber"]
          args:
            # Required to enable the controller-runtime manager (the v3.x
            # rollout gate; legacy HTTP path is still present in the
            # binary). Mode gating (currently permissive) lives BELOW this
            # flag — see env vars.
            - --leader-elect=false
            - --metrics-bind-address=:8081
            - --health-probe-bind-address=:8082
          env:
            # Phase 6 permissive: the operator is live and managing one
            # PVC. nginx-example/storage carries BOTH
            # pvc-plumber.io/enabled="true" AND
            # pvc-plumber.io/manage-volsync="true", so the operator created
            # and now manages ReplicationSource/storage +
            # ReplicationDestination/storage-dst (managed-by=pvc-plumber);
            # the first operator-managed backup succeeded 2026-05-29. The
            # nginx canary is functionally complete. Recommended next
            # migration candidate is homepage-dashboard/config; Karakeep is
            # DEFERRED (destructive, explicit-auth only). Migration order +
            # status: git history (migration-readiness doc, pruned).
            # Enforce/strict are still rejected at startup (Phase 8).
            - name: PVC_PLUMBER_MODE
              value: "permissive"
            # Enable the operator code path (manager + reconciler).
            # Without this, the binary stays in legacy HTTP-only mode.
            - name: OPERATOR_MODE
              value: "true"
            # Tighten log level for the permissive rollout; v4 emits a lot
            # of reconcile/op entries that are useful for observability but
            # noisy at DEBUG.
            - name: LOG_LEVEL
              value: "info"
            # Backend env vars are INERT under any v4-routed mode.
            # Patch 6.7-wire's needsBackend(mode) returns false for
            # audit and permissive, so cmd/operator/main.go skips
            # buildBackend and the legacy HTTP server entirely. These
            # values stay in the manifest only to ease a future rollback
            # to a hypothetical v3 chart-era binary; remove once that
            # rollback path is no longer a real option.
            - name: BACKEND_TYPE
              value: "s3"
            - name: KOPIA_S3_ENDPOINT
              value: "192.168.10.133:30292"
            - name: KOPIA_S3_BUCKET
              value: "volsync-kopia"
            - name: KOPIA_S3_DISABLE_TLS
              value: "true"
            # v4 builder/executor defaults — consumed by the v4
            # reconciler when it renders RS/RD specs (Patch 6.5+
            # builder.Inputs.Default*). Required when
            # PVC_PLUMBER_MODE=permissive (RequireV4WriteDefaults in
            # cmd/operator/main.go errors at startup if any are unset
            # or if UID/GID/FSGroup are zero); optional in audit mode
            # but pre-staged here so flipping to permissive becomes a
            # one-line env change rather than a multi-field shuffle.
            # Values match the talos cluster's 568:568:568 +
            # longhorn-snapclass + longhorn convention used by every
            # current inline RS/RD pattern in my-apps/**.
            - name: PVC_PLUMBER_DEFAULT_SNAPSHOT_CLASS
              value: "longhorn-snapclass"
            - name: PVC_PLUMBER_DEFAULT_CACHE_CAPACITY
              value: "2Gi"
            - name: PVC_PLUMBER_DEFAULT_STORAGE_CLASS
              value: "longhorn"
            - name: PVC_PLUMBER_DEFAULT_UID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_GID
              value: "568"
            - name: PVC_PLUMBER_DEFAULT_FSGROUP
              value: "568"
            # Pod metadata for log correlation.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: metrics
              containerPort: 8081
              protocol: TCP
            - name: probes
              containerPort: 8082
              protocol: TCP
            # rc3+: audit HTTP server bound to cfg.Port (defaults to 8080,
            # PORT env intentionally unset). Serves /audit (parity report
            # JSON), plus inline /healthz and /readyz for symmetry with
            # the legacy port. Kubelet probes intentionally still target
            # `probes` (controller-runtime manager) — this port is for
            # clients that consume the parity report.
            - name: audit-http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # /tmp is needed by Go's default temp directory and by
            # readOnlyRootFilesystem deployments generally. Keep it
            # ephemeral; the operator has no persistent state.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
      # Schedule on any node — operator is cheap, no GPU/special hardware.
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
          tolerationSeconds: 30
