apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-api-credentials
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-api-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Key IS the driver's env-var name — consumed whole via envFrom by both
        # the controller and node plugin (see driver.yaml).
        TRUENAS_API_KEY: "{{ .apiKey }}"
  data:
    - secretKey: apiKey
      remoteRef:
        # Dedicated TrueNAS 26 service-account key. Keeping this separate from
        # the old Democratic CSI item makes a missing rotation fail closed.
        key: truenas-csi
        property: apiKey
