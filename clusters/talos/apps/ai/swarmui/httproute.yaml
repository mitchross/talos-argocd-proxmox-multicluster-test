apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: swarmui-route
  namespace: swarmui
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway-internal
      namespace: gateway
  hostnames:
    - swarmui.vanillax.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # Image/video generation can run long — match other AI apps' 30m window.
      timeouts:
        request: 30m
        backendRequest: 30m
      backendRefs:
        - group: ""
          kind: Service
          name: swarmui-service
          port: 7801
          weight: 1
