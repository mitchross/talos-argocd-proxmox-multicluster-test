apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: home-assistant
  namespace: home-assistant
  labels:
    app.kubernetes.io/name: home-assistant
    app.kubernetes.io/component: home-automation
    app.kubernetes.io/part-of: smart-home
    external-dns-technitium: "true"
  annotations:
    # Technitium private DNS should hit the live openshift-gateway address.
    external-dns.alpha.kubernetes.io/target: 192.168.10.230
    gateway.networking.k8s.io/timeout: 300s
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: openshift-gateway
    namespace: openshift-ingress
  hostnames:
  - homeassistant.vanillax.xyz
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - group: ''
      kind: Service
      name: home-assistant
      port: 8123
      weight: 1
    timeouts:
      request: 60s
      backendRequest: 30s
