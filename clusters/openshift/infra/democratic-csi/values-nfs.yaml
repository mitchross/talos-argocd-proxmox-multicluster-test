# democratic-csi — TrueNAS NFS release (truenas-nfs)
# Dynamic RWX NFS StorageClass (truenas-nfs-csi) provisioned on TrueNAS
# (192.168.10.133). This is the dynamic complement to the existing STATIC
# csi-driver-nfs / csi-driver-smb shares, which are intentionally kept for the
# media apps that already mount pre-existing data.

csiDriver:
  name: org.democratic-csi.nfs

controller:
  rbac:
    openshift:
      privileged: true
node:
  rbac:
    openshift:
      privileged: true
  driver:
    localtimeHostPath: null

driver:
  existingConfigSecret: truenas-nfs-config
  config:
    driver: freenas-api-nfs

storageClasses:
  - name: truenas-nfs-csi
    defaultClass: false
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: nfs
    mountOptions:
      - nfsvers=4.1
      - noatime
      - tcp

volumeSnapshotClasses:
  - name: truenas-nfs-csi-snapshot
    deletionPolicy: Delete
