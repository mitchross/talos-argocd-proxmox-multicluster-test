apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: temporal-database
spec:
  bootstrap:
    recovery:
      source: temporal-recovery-source
      # No database/owner/secret here — mirrors the Talos temporal recovery:
      # the restored data already contains temporal + temporal_visibility.
      # No recoveryTarget -> restore to latest WAL available on S3.
  # Plugin-shape externalClusters. Reuses the prod ObjectStore CR
  # (base/objectstore.yaml) — same bucket, creds, endpoint; only serverName
  # selects the lineage subtree under cnpg-sno/temporal/.
  externalClusters:
    - name: temporal-recovery-source
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: temporal-objectstore
          # Lineage to recover FROM. Keep at N-1 relative to
          # base/cluster.yaml's serverName — bump BOTH in lockstep per the
          # procedure in kustomization.yaml. sno-v1 is the first (current)
          # SNO lineage; valid as a recovery source only after base has been
          # bumped to sno-v2.
          serverName: temporal-database-sno-v1
