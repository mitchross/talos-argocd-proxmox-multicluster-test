# Cluster-scoped pieces of the operator-free VolSync migration.
# Deployed once, not per-app. Sync wave 2 (same as pvc-plumber — they
# coexist safely during the migration; the MAP targets Jobs while
# pvc-plumber webhooks target PVCs, no admission conflict).
# Standalone Application: infrastructure/controllers/argocd/apps/core-dependencies/volsync-backup-cluster-app.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - clusterexternalsecret.yaml
  - mutating-admission-policy.yaml
# talos-patch.yaml is NOT a Kubernetes resource. Retained as documentation
# only (apiserver dependency reference for pre-1.34 clusters). Deliberately
# not listed under resources.
