# Tile-server — Caddy + FastAPI. Serves:
#   /tiles/*          rendered radar/HRRR/etc PNG tiles (from PVC)
#   /basemap/tiles/*  proxied to basemap service (go-pmtiles)
#   /basemap/styles/* Protomaps style JSONs baked into the image
#   /api/*            FastAPI endpoints (manifest, wind-field, storms, etc.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tile-server
  namespace: radar-ng
  labels:
    app: tile-server
spec:
  # Replicas managed by HPA (hpa-tile-server.yaml). Floor of 3 keeps the
  # public API responsive while workers catch up tile generation.
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: tile-server
  template:
    metadata:
      labels:
        app: tile-server
      annotations:
        # Bump to force pod template change when only env-var changes are
        # made — ArgoCD's SSA was masking the FORECAST_TTL_S addition due
        # to an old kubectl-rollout field-manager owning the env array.
        # Annotation diffs can't be silently squashed; this guarantees a
        # ReplicaSet roll on each gitops bump.
        config-rev: "2026-05-10-forecast-ttl-300"
    spec:
      # Spread replicas across nodes so a single node failure can't take
      # the API offline. ScheduleAnyway lets the second pod schedule even
      # if there's only one matching node available.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: tile-server
      # Pod-level securityContext satisfies the radar-ng namespace
      # PodSecurity "restricted" profile (currently warn-only). Image
      # creates UID 1000 'app' user; ports 8000/8080 don't need
      # NET_BIND_SERVICE so all caps can be dropped.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tile-server
          image: registry.vanillax.me/radar-ng-tile-server:v1.1.4
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TILE_DIR
              value: /data/tiles
            - name: GRID_DIR
              value: /data/grids
            - name: STATE_DIR
              value: /data/state
            - name: OPEN_METEO_BASE
              value: http://open-meteo:8080/v1/forecast
            - name: MRMS_MAX_AGE_S
              value: "600"
            # 2026-05-10: dropped from default 900s → 300s. Pull-to-refresh
            # on the home tab refetches client-side, but the response was
            # still served from this in-process cache for up to 15 min so
            # the user-visible data didn't change. 5 min keeps us polite to
            # Open-Meteo upstream while making refresh feel responsive.
            - name: FORECAST_TTL_S
              value: "300"
            # Temporal client — used by /v1/push-tokens, /v1/watches, /v1/workflows.
            # See backend/api/api/routes_workflows.py in the radar-ng repo.
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_NAMESPACE
              value: default
          volumeMounts:
            - name: tiles
              mountPath: /data/tiles
              readOnly: true
            - name: grids
              mountPath: /data/grids
              readOnly: true
            - name: state
              mountPath: /data/state
              readOnly: true
          resources:
            requests:
              cpu: 250m
              # Idle steady-state is ~56Mi but three generations of pods
              # OOMKilled (exit 137) at the 1Gi limit across 2026-05-20→22,
              # so the burst path needs more headroom than the prior cap
              # provided. Bumping requests to 512Mi gives the scheduler a
              # truthful floor and the 2Gi limit absorbs render/tile bursts.
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
      volumes:
        - name: tiles
          persistentVolumeClaim:
            claimName: tiles
        - name: grids
          persistentVolumeClaim:
            claimName: grids
        - name: state
          persistentVolumeClaim:
            claimName: state
