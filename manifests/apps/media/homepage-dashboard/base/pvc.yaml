# PV definition removed
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: config
  namespace: homepage-dashboard
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
  labels:
    app: homepage
    type: config
    restore-policy: "strict"
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  resources:
    requests:
      storage: 5Gi
  storageClassName: vanillax-local-rwo
  # Static dataSourceRef → ReplicationDestination/config-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. The RS/RD targeted here are
  # operator-managed by pvc-plumber (rc7+): this PVC carries the v4 write
  # fuse (pvc-plumber.io/enabled + pvc-plumber.io/manage-volsync), so the
  # operator creates and repairs ReplicationSource/config +
  # ReplicationDestination/config-dst — and recreates either within
  # seconds if it is deleted — via its RS/RD watch. The inline Argo-owned
  # RS/RD were handed off to the operator on 2026-05-29 after the rc7
  # watch was verified live. See git history (v4 cutover doc, pruned 2026-06-13).
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: config-dst
