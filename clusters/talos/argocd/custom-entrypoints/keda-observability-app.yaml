# KEDA observability (OPTIONAL) — ServiceMonitors split out of the KEDA core app.
#
# Bootstrap principle: a bootstrap-critical app (keda, Wave 4) must NOT render
# monitoring.coreos.com CRs, because those CRDs don't exist until
# kube-prometheus-stack (Wave 5). This app carries KEDA's ServiceMonitors and
# syncs at Wave 6 — strictly AFTER monitoring — so it never gates storage /
# controller / restore bootstrap. SkipDryRunOnMissingResource is acceptable
# HERE (observability only) as a safety net; KEDA core does not need it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-observability
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  labels:
    app.kubernetes.io/part-of: infrastructure
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/keda-observability
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=false
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    # Observability-only escape hatch: if monitoring CRDs are momentarily absent
    # this app still syncs without wedging. Core apps must NEVER rely on this.
    - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
