# pvc-plumber operator runtime VolSync writer RBAC (Patch 7.7 → DRY refactor).
#
# The v4 reconciler in permissive mode creates / updates / deletes
# ReplicationSource / ReplicationDestination objects for PVCs carrying BOTH
# v4 fuse labels (pvc-plumber.io/enabled=true AND
# pvc-plumber.io/manage-volsync=true).
#
# DRY MODEL (since pvc-plumber v4.0.1):
#   * One ClusterRole defines the verb/resource matrix (RS/RD only).
#   * ONE ClusterRoleBinding grants it cluster-wide to the operator SA.
#   * There are NO per-namespace RoleBindings anymore. Adding a managed
#     namespace no longer requires an RBAC change — it requires the
#     namespace opt-in label pvc-plumber.io/managed-namespace="true" plus
#     the PVC fuse labels.
#
# WHY THIS IS SAFE — the namespace write gate is the boundary, NOT RBAC:
#   pvc-plumber v4.0.1 (commit da40246) enforces a software gate in the
#   planner: even though this RBAC grants RS/RD writes cluster-wide, the
#   operator writes ONLY when the target namespace carries
#   pvc-plumber.io/managed-namespace="true" AND the PVC carries both fuse
#   labels. A PVC opted in inside an UNMANAGED namespace yields
#   action=skipped-namespace-not-managed with zero ops (no create/update/
#   delete, including the tier=disabled teardown). Executor safety is
#   unchanged: writes are RS/RD only (hard GVK allow-list); update/delete
#   require app.kubernetes.io/managed-by=pvc-plumber on the live object; no
#   PVC/Secret/ExternalSecret/Argo writes ever.
#
#   *** DO NOT deploy this ClusterRoleBinding with a pvc-plumber image
#   older than v4.0.1. *** Pre-v4.0.1 has no namespace gate, so cluster-wide
#   RBAC would let any PVC with both fuse labels in ANY namespace trigger
#   RS/RD creation. Rollback rule: if the operator misbehaves under this
#   RBAC, revert THIS RBAC commit first (restoring per-namespace
#   RoleBindings), and only then consider an image rollback — never run
#   cluster-wide RBAC without the gate live.
#
# Why no `update` verb beyond patch:
#   the v4 reconciler issues server-side Apply (SSA) patches; `patch`
#   covers SSA. No PUT/Update is used. No status subresource is written
#   (VolSync owns RS/RD status).
#
# Managed namespaces today carry the pvc-plumber.io/managed-namespace label
# on their own namespace.yaml manifests: nginx-example, homepage-dashboard,
# karakeep. Preflight + cutover contract: git history (v4 cutover doc, pruned 2026-06-13).

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pvc-plumber:volsync-writer
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
    pvc-plumber.io/mode: permissive
rules:
  - apiGroups: ["volsync.backube"]
    resources: ["replicationsources", "replicationdestinations"]
    # "update" is required by the v4.0.2 drift-repair path: the executor
    # uses read-then-overwrite Update (not Patch) on owned RS/RD. The
    # verb was missing until the 2026-06-10 drift drill — the update op
    # had never fired in production before v4.0.2, so the RBAC denial was
    # invisible (/audit showed would-update with exec Failed: forbidden).
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# Single cluster-wide binding (DRY). Replaces the former per-namespace
# RoleBindings (nginx-example, homepage-dashboard, karakeep, fizzy). The
# v4.0.1 namespace gate — not this binding — decides where writes happen.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pvc-plumber:volsync-writer
  labels:
    app.kubernetes.io/name: pvc-plumber
    app.kubernetes.io/component: backup-restore-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pvc-plumber:volsync-writer
subjects:
  - kind: ServiceAccount
    name: pvc-plumber
    namespace: pvc-plumber
