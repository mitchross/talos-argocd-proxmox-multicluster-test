# pvc-plumber v4 — permissive-mode kustomization (rc7 live).
#
# Phase 6 of docs/storage-architecture.md. Deployed by the Argo Application at
# ../argocd/apps/core-dependencies/pvc-plumber-app.yaml (sync wave 2).
#
# Resources in deliberate order:
#   1. Namespace (must exist first; pod-security restricted)
#   2. ServiceAccount + RBAC:
#        - rbac.yaml          : cluster-wide read-only audit-reader CRB
#        - rbac-adopt.yaml    : adopt-CLI SA + canary-scoped RBAC
#        - rbac-volsync-writer.yaml : namespace-scoped RS/RD write RBAC
#                               (Patch 7.7; per managed namespace)
#   3. Deployment (single replica, permissive env, no webhook server)
#   4. Service + ServiceMonitor (controller-runtime metrics)
#   5. PrometheusRule (minimal pod-down alerts)
#
# NOT included:
#   - MutatingWebhookConfiguration  (no admission gate under any v4 mode)
#   - ValidatingWebhookConfiguration
#   - cert-manager Certificate or webhook TLS Secret
#   - PodDisruptionBudget (single-replica operator)
#
# These come back in later phases (Phase 8 — webhook deployment), tracked
# in the PRD.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# BOOTSTRAP-CORE ONLY (Wave 2). The 2026-06-01 full-cluster nuke/rebuild drill
# proved that bundling late/optional resources here deadlocks the whole wave
# gate on a fresh cluster:
#   - servicemonitor.yaml / prometheusrule.yaml need monitoring.coreos.com CRDs
#     that don't exist until kube-prometheus-stack at Wave 5 → SyncFailed.
#   - rbac-adopt.yaml hardcodes a Role/RoleBinding into the nginx-example
#     namespace (a Wave-6 my-app) → SyncFailed ("namespaces nginx-example not
#     found"), and the adopt-CLI is NOT part of the v4.0.1 restore path.
# Those kept pvc-plumber OutOfSync and (originally) blocked root's wave gate.
# Wave 2 now contains ONLY the bootstrap-critical operator core. The removed
# files remain in-repo (unreferenced) — re-introduce monitoring via a separate
# app gated AFTER Wave 5 if/when desired (post-bootstrap optional).
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml                  # cluster-wide read-only audit-reader CR + CRB
  - rbac-volsync-writer.yaml   # cluster-wide RS/RD writer CR + CRB
  - deployment.yaml
  - service.yaml
  # --- removed from Wave-2 bootstrap (see header) ---
  # - rbac-adopt.yaml          # adopt-CLI SA + canary RBAC + nginx-example Role/RB (not in v4 restore path)
  # - servicemonitor.yaml      # needs monitoring.coreos.com CRD (Wave 5) → post-bootstrap optional
  # - prometheusrule.yaml      # needs monitoring.coreos.com CRD (Wave 5) → post-bootstrap optional
