# Grafana dashboard for radar-ng.
#
# Sources:
#   - Loki   (logs)    — uses OTEL labels: k8s_namespace_name, k8s_container_name
#   - Prometheus (metrics) — scraped from tile-server's /api/metrics via
#     my-apps/development/radar-ng/servicemonitor.yaml
#
# The dashboard is auto-imported via the `grafana_dashboard: "1"` label.
apiVersion: v1
kind: ConfigMap
metadata:
  name: radar-ng-dashboard
  namespace: prometheus-stack
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboards
data:
  radar-ng.json: |
    {
      "title": "radar-ng",
      "uid": "radar-ng-overview",
      "tags": ["radar-ng", "app"],
      "timezone": "browser",
      "schemaVersion": 39,
      "editable": true,
      "graphTooltip": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "type": "datasource",
            "name": "DS_PROM",
            "label": "Prometheus",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          },
          {
            "type": "datasource",
            "name": "DS_LOKI",
            "label": "Loki",
            "query": "loki",
            "current": { "text": "Loki", "value": "Loki" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "MRMS radar data age (seconds)",
          "description": "Time since the newest radar tile was written. Should stay < 300s during normal MRMS polling.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 5 },
          "targets": [
            { "expr": "radar_ng_mrms_age_seconds", "refId": "A" }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 300 },
                  { "color": "red", "value": 900 }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "area" }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "tile-server requests/sec by endpoint",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 6, "y": 0, "w": 12, "h": 5 },
          "targets": [
            { "expr": "rate(radar_ng_manifest_requests_total[5m])", "refId": "A", "legendFormat": "manifest" },
            { "expr": "rate(radar_ng_forecast_requests_total[5m])", "refId": "B", "legendFormat": "forecast" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Forecast cache hit %",
          "description": "Open-Meteo forecast cache efficiency.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 5 },
          "targets": [
            {
              "expr": "100 * sum(rate(radar_ng_forecast_cache_hits_total[5m])) / clamp_min(sum(rate(radar_ng_forecast_requests_total[5m])), 1)",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "green", "value": 80 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Log volume by container",
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum by (k8s_container_name) (count_over_time({k8s_namespace_name=\"radar-ng\"}[1m]))",
              "refId": "A",
              "legendFormat": "{{k8s_container_name}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Upstream errors (forecast)",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(radar_ng_forecast_upstream_errors_total[5m])", "refId": "A", "legendFormat": "errors/sec" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 6,
          "type": "logs",
          "title": "Recent error lines (all radar-ng containers)",
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 10 },
          "targets": [
            {
              "expr": "{k8s_namespace_name=\"radar-ng\"} |~ \"(?i)error|exception|traceback|failed\"",
              "refId": "A"
            }
          ],
          "options": { "showTime": true, "wrapLogMessage": true, "dedupStrategy": "none" }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Tile timestamps per layer",
          "description": "Number of available timestamp slices per rendered layer. Drops here usually indicate an ingestor stall.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 0, "y": 23, "w": 24, "h": 8 },
          "targets": [
            { "expr": "radar_ng_tile_timestamps", "refId": "A", "legendFormat": "{{layer}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "id": 100,
          "type": "row",
          "title": "Backend pressure",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 31, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Pod CPU vs request (% of CPU request)",
          "description": "Per-pod CPU consumption normalized to the pod's CPU request. >100% means the pod is bursting into limit headroom; sustained >70% on tile-server triggers HPA scale-out.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 0, "y": 32, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"radar-ng\", container!=\"\", container!=\"POD\"}[5m])) / on (pod) group_left sum by (pod) (kube_pod_container_resource_requests{namespace=\"radar-ng\", resource=\"cpu\"})",
              "refId": "A",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 100 }
                ]
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Pod memory vs limit (% of memory limit)",
          "description": "Working set as percent of memory limit. >85% sustained = OOM kill risk.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 12, "y": 32, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "100 * sum by (pod) (container_memory_working_set_bytes{namespace=\"radar-ng\", container!=\"\", container!=\"POD\"}) / on (pod) group_left sum by (pod) (kube_pod_container_resource_limits{namespace=\"radar-ng\", resource=\"memory\"})",
              "refId": "A",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "tile-server replicas (HPA)",
          "description": "Current vs desired vs min/max. If current pins at maxReplicas you're undersized — bump the HPA cap.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 0, "y": 40, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"radar-ng\", horizontalpodautoscaler=\"tile-server\"}",
              "refId": "A",
              "legendFormat": "current"
            },
            {
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"radar-ng\", horizontalpodautoscaler=\"tile-server\"}",
              "refId": "B",
              "legendFormat": "desired"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"radar-ng\", horizontalpodautoscaler=\"tile-server\"}",
              "refId": "C",
              "legendFormat": "max"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_min_replicas{namespace=\"radar-ng\", horizontalpodautoscaler=\"tile-server\"}",
              "refId": "D",
              "legendFormat": "min"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "short", "min": 0 } }
        },
        {
          "id": 11,
          "type": "stat",
          "title": "OOM kills (1h)",
          "description": "Pods killed for exceeding memory limit in the last hour. Should be 0 in steady state.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 12, "y": 40, "w": 6, "h": 7 },
          "targets": [
            {
              "expr": "sum(increase(container_oom_events_total{namespace=\"radar-ng\"}[1h]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "area" }
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Container restarts (1h)",
          "description": "All restarts in radar-ng over the last hour. ingest-mrms typically restarts on retention sweeps; spike on tile-server is the one to chase.",
          "datasource": { "type": "prometheus", "uid": "${DS_PROM}" },
          "gridPos": { "x": 18, "y": 40, "w": 6, "h": 7 },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"radar-ng\"}[1h]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          },
          "options": { "colorMode": "background", "graphMode": "area" }
        }
      ]
    }
