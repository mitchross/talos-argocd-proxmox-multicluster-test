apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    # The speaker DaemonSet runs hostNetwork + NET_RAW/NET_ADMIN for L2/ARP,
    # which requires the privileged Pod Security level. The scc-rolebinding
    # grants the speaker SA the privileged SCC.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
