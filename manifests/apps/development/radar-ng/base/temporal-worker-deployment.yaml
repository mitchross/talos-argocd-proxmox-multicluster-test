# radar-ng Temporal worker — WorkerDeployment CR (migrated from
# TemporalWorkerDeployment, which the v1.7.0 controller no longer
# reconciles — its `deprecated-twd` handler is a no-op).
#
# Lives in the radar-ng namespace (NOT a separate worker namespace, the way
# news-reader-temporal-worker does it) because the worker needs to mount the
# same Longhorn PVCs the API + legacy ingestors already use. PVCs are
# namespace-scoped; sharing a namespace is the simplest answer.
#
# The Temporal Worker Controller injects TEMPORAL_ADDRESS, TEMPORAL_NAMESPACE,
# TEMPORAL_DEPLOYMENT_NAME, TEMPORAL_WORKER_BUILD_ID into every Pod — do not
# set them via env here.
#
# Image is built by .gitea/workflows/build-temporal-worker.yml. Renovate
# auto-PRs bumps. Each tag bump becomes a new build_id + progressive rollout.
apiVersion: temporal.io/v1alpha1
kind: WorkerDeployment
metadata:
  name: radar-ng-worker
  namespace: radar-ng
  labels:
    app: radar-ng-worker
spec:
  replicas: 3
  workerOptions:
    connectionRef:
      name: cluster-temporal
    temporalNamespace: default
  rollout:
    # Same progressive shape as news-reader-temporal-worker. Tune per
    # workload — radar ingest is more time-sensitive than news.
    strategy: Progressive
    steps:
      - rampPercentage: 10
        pauseDuration: 2m
      - rampPercentage: 50
        pauseDuration: 5m
  sunset:
    scaledownDelay: 10m
    deleteDelay: 1h
  template:
    metadata:
      labels:
        app: radar-ng-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: registry.vanillax.me/radar-ng-temporal-worker:v1.1.7
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: [ALL] }
          env:
            # OTEL collector is not deployed in the cluster — leaving the
            # endpoint set caused continuous "UNAVAILABLE" gRPC retries from
            # BatchSpanProcessor, swamping logs. The bootstrap in
            # temporal/shared/otel.py installs the OTLP exporter only when
            # this env is set, so omitting it gives a no-op tracer.
            #
            # CONFIG_REV is a no-op env var; bumping its value forces the
            # Temporal Worker Controller to compute a new build_id and roll
            # the pods, which is what we need to pick up envFrom'd
            # ConfigMap changes. (Pod template annotations are excluded
            # from the controller's hash, so they don't trigger a roll.)
            - name: CONFIG_REV
              value: "2026-05-10-backlog1"
            - name: TILE_DIR
              value: /data/tiles
            - name: STATE_DIR
              value: /data/state
            - name: GRID_DIR
              value: /data/grids
            # Push notifications are disabled by default — the
            # `send_push_notification` activity logs+returns without
            # touching APNS/FCM. Re-enable by setting PUSH_DISABLED=0
            # AND mounting the push-keys secret (see git history of this
            # file for the secret/volume blocks that were removed).
            - name: PUSH_DISABLED
              value: "1"
          envFrom:
            - configMapRef: { name: radar-ng-temporal-config }
          volumeMounts:
            - { name: tiles,  mountPath: /data/tiles }
            - { name: grids,  mountPath: /data/grids }
            - { name: state,  mountPath: /data/state }
          resources:
            # Capacity baseline 2026-05-04 showed each replica observed
            # 1.91-1.93 cores, saturating the old 2-core limit. On
            # 2026-05-10 Temporal was down for ~3h, then radar-ng needed
            # enough worker capacity to catch up MRMS + nowcast without
            # starving schedule seeding or API traffic. Keep CPU request
            # at 1 core so progressive rollouts can overlap old+new
            # ReplicaSets without hitting cluster scheduling limits; the
            # 4-core limit still lets active render work burst.
            requests: { cpu: "1", memory: "3Gi" }
            limits:   { cpu: "4", memory: "10Gi" }
      volumes:
        - name: tiles
          persistentVolumeClaim: { claimName: tiles }
        - name: grids
          persistentVolumeClaim: { claimName: grids }
        - name: state
          persistentVolumeClaim: { claimName: state }
