# fizzy (Rails/Basecamp) needs a writable home ("/" not writable under the
# restricted-v2 random UID → Bundler errors) AND binds privileged port :80
# (needs NET_BIND_SERVICE). The fizzy-privileged SCC RoleBinding alone wasn't
# enough — OpenShift only selects privileged if the pod actually REQUESTS it.
# runAsUser:0 + NET_BIND_SERVICE forces privileged selection and satisfies both
# needs. (2026-06-17)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fizzy
  namespace: fizzy
spec:
  template:
    spec:
      securityContext:
        runAsUser: 0
      containers:
        - name: fizzy
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add: ["NET_BIND_SERVICE"]
