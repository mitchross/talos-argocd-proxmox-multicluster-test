apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ns.yaml
  - externalsecret-webhook.yaml
  # NOTE: http-route.yaml is carried by the gateway entrypoint so it deploys
  # at wave 4 with the Gateway. Including it here (wave 0) causes a bootstrap deadlock:
  # HTTPRoute stays Progressing with no Gateway, blocking all subsequent sync waves.
  # NOTE: clusters/talos/bootstrap/root.yaml is NOT listed here. It is applied
  # once by the bootstrap script. Including it here would create a circular
  # dependency: root creates argocd.yaml, argocd.yaml manages this directory,
  # and this entrypoint would then try to manage the root Application itself.
helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: "9.5.21" # It's good practice to pin the chart version (app v3.4.3)
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
    includeCRDs: true
