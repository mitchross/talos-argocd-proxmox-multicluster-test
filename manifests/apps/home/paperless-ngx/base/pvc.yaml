apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: data
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=hourly; ns gated managed-namespace=true. Mover 568. Disposable reset
    # — recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: vanillax-local-rwo
  # dataSourceRef → ReplicationDestination/data-dst (added 2026-05-31 during the
  # paperless-data restore drill). The empty reset originally omitted this to
  # avoid auto-restoring the nuked data; now that the app has rebuilt real data
  # AND pvc-plumber backs it up, the dsr closes the DR gap — on recreate the
  # VolSync volume populator restores the latest backup. No-op while Bound.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: data-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: paperless-ngx
    type: media
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-31): operator-managed at
    # tier=hourly; ns gated managed-namespace=true. Mover 568. Disposable reset
    # — recreated EMPTY (no dataSourceRef); operator backs up going forward.
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: vanillax-local-rwo
  # dataSourceRef → ReplicationDestination/media-dst (added 2026-05-31 during the
  # paperless-media DR-completion drill). The empty reset originally omitted this;
  # media now holds document originals/archives that pvc-plumber backs up, so the
  # dsr closes the DR gap — on recreate the VolSync volume populator restores the
  # latest backup. No-op while Bound. (Matches paperless/data, copyparty, etc.)
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: media-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-export-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: export
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless export staging dir; content is rebuildable from /media which has backup=hourly"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: vanillax-local-rwo
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume-pvc
  namespace: paperless-ngx
  labels:
    app: paperless-ngx
    type: consume
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "Paperless consume inbox; transient — files move to /media after ingestion"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: vanillax-local-rwo

# NOTE: inline ReplicationSource/ReplicationDestination for data (data-dst) and
# media (media-dst) were REMOVED 2026-05-31 (pvc-plumber v4.0.1 DRY handoff).
# pvc-plumber now owns the RS/RD lifecycle for both (tier=hourly, mover 568).
# Do not re-add inline RS/RD here. (export/consume PVCs above stay backup-exempt.)
