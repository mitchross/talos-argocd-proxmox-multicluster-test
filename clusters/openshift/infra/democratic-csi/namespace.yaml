apiVersion: v1
kind: Namespace
metadata:
  name: democratic-csi
  labels:
    # democratic-csi node DaemonSet runs hostNetwork + hostIPC + privileged
    # (iSCSI/NFS mounts on the host). The chart's openshift.privileged=true
    # creates the SCC binding; the namespace must allow privileged PSA.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
