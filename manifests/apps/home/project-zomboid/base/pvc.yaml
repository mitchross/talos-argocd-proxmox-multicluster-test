apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-data
  namespace: project-zomboid
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: project-zomboid
    restore-policy: "strict"
    # pvc-plumber v4.0.1 DRY handoff (2026-05-30): operator-managed at
    # tier=daily; ns project-zomboid carries managed-namespace=true. Mover 568.
    # Migrated via Option-R reset (backup→-dst dsr; recreated from quiesced
    # snapshot). Old PV pvc-d71b929e retained. Sibling zomboid-server-files
    # stays backup-exempt (not fused).
    pvc-plumber.io/enabled: "true"
    pvc-plumber.io/manage-volsync: "true"
    pvc-plumber.io/tier: "daily"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: vanillax-local-rwo
  # Static dataSourceRef → ReplicationDestination/zomboid-data-dst. No-op while
  # the PVC is already Bound. RS/RD are operator-managed by pvc-plumber v4.0.1
  # (DRY handoff, 2026-05-30): the operator creates and repairs
  # ReplicationSource/zomboid-data + ReplicationDestination/zomboid-data-dst as
  # managed-by=pvc-plumber via its RS/RD watch.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: zomboid-data-dst
---
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zomboid-server-files
  namespace: project-zomboid
  labels:
    app: project-zomboid
    backup-exempt: "true"
  annotations:
    storage.vanillax.dev/backup-exempt-reason: "SteamCMD-installed game files; rebuildable via the existing SteamCMD pre-warm path"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 60Gi
  storageClassName: vanillax-local-rwo

# NOTE: inline ReplicationSource/zomboid-data + ReplicationDestination/
# zomboid-data-dst were REMOVED on 2026-05-30 (pvc-plumber v4.0.1 DRY handoff).
# pvc-plumber now owns the RS/RD lifecycle for zomboid-data. Do not re-add here.
# (zomboid-server-files above remains backup-exempt — no RS/RD by design.)
