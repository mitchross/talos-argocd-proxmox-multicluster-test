apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
  labels:
    app.kubernetes.io/name: renovate
spec:
  # Poll hourly for LAN-registry image updates. Offset from the top of the hour
  # to avoid the common CronJob burst. concurrencyPolicy=Forbid prevents overlap.
  schedule: "17 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: renovate
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 12021
            runAsGroup: 0
            fsGroup: 0
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: renovate
              image: ghcr.io/renovatebot/renovate:43.220.0
              imagePullPolicy: IfNotPresent
              env:
                # The "customManager only extracts 1 of N" symptom that put
                # this at debug was NOT a regex bug — runs were aborting in
                # the dependency-lookup phase on Docker Hub 429s
                # (external-host-error) before extraction completed. The
                # 2026-05-17 two-instance split removes all public/Docker Hub
                # deps from this self-hosted instance (it now resolves only
                # registry.vanillax.me via the configmap `force` block), so
                # runs complete and all gitea-vanillax deps extract. Back to
                # info.
                - name: LOG_LEVEL
                  value: info
                - name: RENOVATE_CONFIG_FILE
                  value: /config/config.json
                - name: RENOVATE_BASE_DIR
                  value: /tmp/renovate
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: RENOVATE_TOKEN
                # JSON array of host rules — currently just Docker Hub auth
                # so Renovate's docker datasource lookups don't share the
                # 100/6h anonymous quota with the rest of the cluster.
                # Populated from 1Password item `renovate-dockerhub` →
                # field `host_rules`. See externalsecret.yaml.
                - name: RENOVATE_HOST_RULES
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secrets
                      key: RENOVATE_HOST_RULES
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: "2"
                  memory: 2Gi
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: workdir
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: renovate-config
            - name: workdir
              emptyDir:
                sizeLimit: 8Gi
          # Don't take cycles from GPU inference nodes
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: gpu-worker
                        operator: DoesNotExist
