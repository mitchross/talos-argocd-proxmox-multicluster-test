apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: democratic-csi
# Two Helm releases of the same chart — one CSI driver per protocol. iSCSI
# backs vanillax-local-rwo (RWO block); NFS adds a dynamic RWX class.
helmCharts:
  - name: democratic-csi
    repo: https://democratic-csi.github.io/charts/
    version: 0.15.1
    releaseName: truenas-iscsi
    namespace: democratic-csi
    includeCRDs: false
    valuesFile: values-iscsi.yaml
  - name: democratic-csi
    repo: https://democratic-csi.github.io/charts/
    version: 0.15.1
    releaseName: truenas-nfs
    namespace: democratic-csi
    includeCRDs: false
    valuesFile: values-nfs.yaml
resources:
  - namespace.yaml
  - externalsecret-iscsi.yaml
  - externalsecret-nfs.yaml
