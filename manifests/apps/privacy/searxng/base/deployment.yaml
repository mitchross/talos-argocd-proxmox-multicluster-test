apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  labels:
    app.kubernetes.io/name: searxng
spec:
  # 1 replica on purpose: all pods NAT out the same egress IP, so extra replicas
  # add no IP diversity — they just triple the request volume hitting upstream
  # engines AND fragment engine-suspension state (it's per-pod in memory, NOT
  # shared via valkey), so a blocked engine gets re-hammered by each pod before
  # all of them bench it → faster/harder 403/429/CAPTCHA bans. Query volume for a
  # personal Perplexica/Vane backend is trivial; one replica is plenty.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  strategy:
    type: RollingUpdate
  revisionHistoryLimit: 1
  template:
    metadata:
      namespace: searxng
      labels:
        app.kubernetes.io/name: searxng
    spec:
      restartPolicy: Always
      initContainers:
        - name: wait-for-redis
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              echo "Waiting for redis to be ready..."
              until nc -z redis 6379; do
                echo "Redis not ready, retrying in 2s..."
                sleep 2
              done
              echo "Redis is ready!"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.6.11-a1490676e
          resources:
            requests:
              memory: 100M
              cpu: 50m
            limits:
              memory: 3000M
          envFrom:
            - configMapRef:
                name: searxng
            - secretRef:
                name: searxng
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 60
          volumeMounts:
            - name: searxng-settings
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yaml
            - name: searxng-limiter
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
      volumes:
        - name: searxng-settings
          configMap:
            name: searxng-config-settings
            items:
              - key: settings.yaml
                path: settings.yaml
        - name: searxng-limiter
          configMap:
            name: searxng-config-settings
            items:
              - key: limiter.toml
                path: limiter.toml
