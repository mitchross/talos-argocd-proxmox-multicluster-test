# argocd-inactive: kolibri Khan Academy app intentionally disabled.
# Upstream image (treehouses/kolibri:0.12.8) is broken on Python 2.7.
# See my-apps/home/project-nomad/kustomization.yaml (kolibri block commented out).
# Source file is kept so this app can be re-enabled cleanly later.
# hack/validate-volsync-wiring.py treats this marker as "intentional inactivity".
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kolibri-data
  namespace: project-nomad
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=false
  labels:
    app: project-nomad
    type: kolibri
    restore-policy: "strict"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: vanillax-local-rwo
  # Static dataSourceRef → ReplicationDestination/kolibri-data-dst.
  # On PVC re-creation (DR / namespace recreate), VolSync's volume
  # populator reads the latest snapshot from the shared kopia repo
  # volsync-kopia-repository and binds this PVC with restored data. No-op
  # while the PVC is already Bound. VolSync ReplicationSource/
  # ReplicationDestination resources are defined below in this file.
  dataSourceRef:
    apiGroup: volsync.backube
    kind: ReplicationDestination
    name: kolibri-data-dst

---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: kolibri-data
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: kolibri-data
spec:
  sourcePVC: kolibri-data
  trigger:
    schedule: "2 2 * * *"
  kopia:
    repository: volsync-kopia-repository
    username: kolibri-data
    hostname: project-nomad
    compression: zstd-fastest
    parallelism: 2
    retain:
      hourly: 24
      daily: 7
      weekly: 4
      monthly: 2
    copyMethod: Snapshot
    storageClassName: vanillax-local-rwo
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
---
apiVersion: volsync.backube/v1alpha1
kind: ReplicationDestination
metadata:
  name: kolibri-data-dst
  namespace: project-nomad
  labels:
    app.kubernetes.io/managed-by: argocd
    volsync.backup/pvc: kolibri-data
spec:
  trigger:
    manual: restore-once
  kopia:
    repository: volsync-kopia-repository
    username: kolibri-data
    hostname: project-nomad
    sourceIdentity:
      sourceName: kolibri-data
      sourceNamespace: project-nomad
      sourcePVCName: kolibri-data
    copyMethod: Snapshot
    storageClassName: vanillax-local-rwo
    volumeSnapshotClassName: longhorn-snapclass
    cacheCapacity: 2Gi
    accessModes:
      - ReadWriteOnce
    capacity: 20Gi
    moverSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
