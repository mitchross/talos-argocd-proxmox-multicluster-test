apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: gateway-l2
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  # Layer 2 (ARP) advertisement of the gateway pool on the node's LAN.
  # platform-None bare metal has no cloud LB, so L2 mode answers ARP for
  # the assigned IP from the node itself.
  ipAddressPools:
    - gateway-pool
