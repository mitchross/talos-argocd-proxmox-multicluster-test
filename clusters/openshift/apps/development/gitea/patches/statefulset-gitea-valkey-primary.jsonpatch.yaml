# Strategic-merge, NOT JSON patch — see deployment-gitea.jsonpatch.yaml for
# why (cluster-side helm renders differ; SMP null-deletes are no-op-safe).
# The bitnami common chart renders a literal empty seLinuxOptions: {} that
# every SCC's MustRunAs strategy rejects ("must be s0:cNN,cNN"), so the
# StatefulSet was FailedCreate-forbidden since bootstrap (verified 2026-06-11).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea-valkey-primary
  namespace: gitea
spec:
  template:
    spec:
      securityContext:
        fsGroup: null
        supplementalGroups: null
      containers:
        - name: valkey
          securityContext:
            runAsUser: null
            runAsGroup: null
            seLinuxOptions: null
