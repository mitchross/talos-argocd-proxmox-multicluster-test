# Node Feature Discovery — prerequisite for the GPU operator (labels the node
# with PCI vendor 10de so the operator knows where to deploy).
# Subscription omits `channel:` -> OLM uses the package defaultChannel.
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-nfd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openshift-nfd
  namespace: openshift-nfd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  targetNamespaces:
    - openshift-nfd
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: nfd
  namespace: openshift-nfd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  name: nfd
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
---
# Operand instance. Modern NFD operators default the operand image to the
# matching cluster version; if the CSV's alm-examples on the live cluster
# carry a fuller spec, prefer that. CR fails until the CSV installs the CRD;
# AppSet retry + selfHeal lands it (same pattern as monitoring-config).
apiVersion: nfd.openshift.io/v1
kind: NodeFeatureDiscovery
metadata:
  name: nfd-instance
  namespace: openshift-nfd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec: {}
