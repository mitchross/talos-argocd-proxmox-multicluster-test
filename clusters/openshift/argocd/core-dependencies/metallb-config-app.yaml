apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: ".;/clusters/openshift/infra/metallb-config"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: openshift-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/openshift/infra/metallb-config
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

