apiVersion: v1
kind: Namespace
metadata:
  name: metallb-system
  labels:
    # MetalLB requires privileged pod security on its namespace (speaker
    # needs host networking + NET_RAW for L2/ARP). The Red Hat operator
    # sets these, but declare them so the namespace is correct on create.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
