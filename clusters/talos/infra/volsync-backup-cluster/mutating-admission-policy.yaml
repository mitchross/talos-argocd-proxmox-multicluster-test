---
# Fail-closed gate for VolSync mover Jobs. Injects an init container that
# probes the RustFS S3 endpoint before the mover runs. If the endpoint is
# unreachable, the init container waits up to TIMEOUT then exits non-zero,
# which fails the Job; Kubernetes Job backoff retries with exponential
# delay, and once RustFS is back the next attempt's init container passes
# and the mover proceeds.
#
# This is the residual safety the migration buys back from pvc-plumber:
#   - pvc-plumber had a webhook on PVC CREATE that probed Kopia and DENIED.
#   - This MAP probes RustFS on Job CREATE and FAILS the Job to retry.
# Same fail-closed semantics on hard-unreachable backend, but:
#   - lives in the apiserver (no operator, no pod, no SPOF binary),
#   - scoped to mover Jobs only (not PVC creates, so no PVC-admission
#     blast radius — backup-labeled PVCs always get created; only the
#     mover Job for them is gated),
#   - reuses author's jitter MAP shape (apps/storage-system/volsync/app/
#     mutating-admission-policy.yaml in mirceanton/home-ops). Sibling
#     policy, same matcher style, different init container.
#
# Coverage note (compare-and-contrast §3): this CANNOT distinguish the
# soft "authoritative no-snapshot" class (RustFS reachable, repo silently
# mispointed). That's the accepted future-burn the migration consciously
# takes on, since the append-only Kopia repo makes such a mistake
# recoverable via restoreAsOf until prune.
#
# REQUIRES: MutatingAdmissionPolicy feature gate enabled on apiserver.
# See talos-patch.yaml.

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicy
metadata:
  name: volsync-mover-backend-availability
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [batch]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [jobs]
  matchConditions:
    # Cover BOTH backup (src) and restore (dst) mover Jobs — author's
    # jitter MAP only matches src; we additionally need dst so a restore
    # during a DR window also waits for RustFS.
    - name: is-volsync-mover-job
      expression: >-
        object.metadata.name.startsWith("volsync-src-") ||
        object.metadata.name.startsWith("volsync-dst-")
    - name: has-volsync-created-by-label
      expression: >-
        object.metadata.?labels["app.kubernetes.io/created-by"].orValue("") == "volsync"
  failurePolicy: Fail
  reinvocationPolicy: IfNeeded
  # Two-step JSONPatch: ensure initContainers array exists, then append.
  # Matches author's jitter MAP shape exactly so the two policies compose
  # predictably (jitter applies first per author's match, this one applies
  # to both src+dst).
  #
  # Init-container timeout sizing (1h): on a cold cluster bootstrap the
# chain 1P Connect -> ESO -> volsync-kopia-repository Secret -> RustFS pod up ->
  # Longhorn ready can realistically take 15-30 min. Failing the Job too
  # early burns the mover Job's backoffLimit (default 6) and a fresh-
  # cluster restore Job ends up permanently Failed instead of patiently
  # waiting. 1h is well beyond any realistic bootstrap but still bounded
  # so a genuinely broken backend produces a Failed Job (visibility
  # signal) instead of an init container stuck forever. Log throttled to
  # every 30s so kubectl logs stays readable. Verify the actual cold-
  # start time in T7b and tune if needed.
  #
  # NOTE: these comments live ABOVE `expression:` deliberately. CEL has
  # no `#` comment syntax, and YAML `>-` would fold any inline `#` lines
  # into the CEL string as text, producing a parse error at policy
  # registration. Keep explanatory comments at the YAML level.
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          [
            JSONPatch{
              op: "add", path: "/spec/template/spec/initContainers",
              value: []
            },
            JSONPatch{
              op: "add", path: "/spec/template/spec/initContainers/-",
              value: Object.spec.template.spec.initContainers{
                name: "wait-for-rustfs",
                image: "ghcr.io/home-operations/busybox:1.38.0@sha256:7e2c04dd50ede647bf4a7a4c8dbd629dd4971cd139b9b88fb22bfc3c7a6c13df",
                imagePullPolicy: "IfNotPresent",
                command: [
                  "sh", "-c",
                  "TIMEOUT=3600; START=$(date +%s); LAST_LOG=0; until nc -zw5 192.168.10.133 30292; do NOW=$(date +%s); if [ $((NOW-START)) -gt $TIMEOUT ]; then echo 'RustFS S3 unreachable >1h, failing Job for backoff retry'; exit 1; fi; if [ $((NOW-LAST_LOG)) -ge 30 ]; then echo \"waiting for rustfs s3 (192.168.10.133:30292) — $((NOW-START))s elapsed\"; LAST_LOG=$NOW; fi; sleep 5; done; echo 'RustFS reachable, proceeding to mover'"
                ]
              }
            }
          ]

---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingAdmissionPolicyBinding
metadata:
  name: volsync-mover-backend-availability
spec:
  policyName: volsync-mover-backend-availability
