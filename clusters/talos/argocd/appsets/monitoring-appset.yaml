apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: talos-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
      revision: main
      files:
      - path: clusters/talos/monitoring/*/.argocd/config.json
  template:
    metadata:
      name: "{{.applicationName}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;/manifests/monitoring"
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
    spec:
      project: "{{.project}}"
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        targetRevision: main
        path: "{{.sourcePath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
        - CreateNamespace=true
        - ServerSideApply=true
        - RespectIgnoreDifferences=true
        - Replace=false
        retry:
          # Bounded retry — see root.yaml. Unbounded -1 plus a misbehaving
          # PreSync hook can wedge the entire app-of-apps behind a stale
          # manifest snapshot (incidents 2026-04-20, 2026-05-01). selfHeal: true
          # kicks a fresh sync against current git on the next reconcile.
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
      info:
      - name: 'Description'
        value: "Monitoring component: {{.namespace}}"
