apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openshift-infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        revision: main
        files:
          - path: clusters/openshift/infra/*/.argocd/config.json
  template:
    metadata:
      name: "{{.applicationName}}"
      annotations:
        argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      labels:
        app.kubernetes.io/part-of: infrastructure
    spec:
      project: "{{.project}}"
      revisionHistoryLimit: 3
      source:
        repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
        targetRevision: main
        path: "{{.sourcePath}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
          - Replace=false
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 10m
