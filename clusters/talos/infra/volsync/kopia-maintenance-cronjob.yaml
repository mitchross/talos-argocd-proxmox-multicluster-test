# Kopia repository maintenance — consolidates index blobs, GCs unreachable
# content, and keeps repo metadata fast. VolSync mover pods have ephemeral
# hostnames, so they can't consistently own maintenance — Kopia records owner
# identity in repo config and refuses maintenance from other identities. This
# CronJob runs with a stable synthetic identity ("maintenance@cluster") and
# claims ownership idempotently on every run.
#
# Schedule: every 6 hours at :37 (bumped from daily 03:37 on 2026-05-21 after
# RustFS alpha started wedging under accumulating index-blob load — 1400+ blobs
# between daily runs meant every kopia connect had to read all of them, which
# overwhelmed RustFS within ~5 min of clients coming online). Quarter-day cadence
# compacts more aggressively and keeps per-connect S3 ops sustainable. :37 is
# still off the top of the hour to avoid colliding with generated hourly backups.
#
# Backend: S3 (kopia v3.1.0 alignment with the pvc-plumber operator). Pre-v3.0
# the repo lived on an NFS share and this CronJob mounted it via a legacy
# `nfs:` volume + `kopia repository connect filesystem`. v3.0 cut over to S3 —
# mover Jobs need no shared volume, JobMutator is gone, and this maintenance
# Job connects via `kopia repository connect s3` against the same bucket the
# operator uses (RustFS at 192.168.10.133:30292, bucket `volsync-kopia`).
#
# Sourcing the password + S3 creds: `Secret/volsync-kopia-repository` is the
# shared Kopia repo Secret produced in this namespace by the
# ClusterExternalSecret `volsync-kopia-repository`
# (infrastructure/storage/volsync-backup-cluster/clusterexternalsecret.yaml).
# The selector volsync.backube/privileged-movers=true is set on this namespace
# in namespace.yaml. The Secret carries KOPIA_PASSWORD, AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY (plus KOPIA_REPOSITORY/KOPIA_S3_* that this CronJob
# overrides with env). Mounted as files at /var/secret/kopia-repo and read at
# runtime — same lazy-credentials pattern the pre-c401822a operator used.
#
# Pre-c401822a: this mounted Secret/pvc-plumber-kopia at /var/secret/pvc-plumber-kopia.
# That Secret was deleted when pvc-plumber was decommissioned (Track B Phase 4,
# d0d92b20); the mount path moved here on 2026-05-22.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-maintenance
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: kopia-maintenance
    app.kubernetes.io/component: backup-maintenance
spec:
  # Every 6 hours at :37 UTC — bumped from daily 03:37 on 2026-05-21. Reasoning
  # in the header comment. Still off the top of the hour to avoid colliding with
  # generated hourly VolSync backup jobs.
  schedule: "37 */6 * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid         # Kopia maintenance holds a repo lock — no overlap
  startingDeadlineSeconds: 3600     # Skip run if missed by >1h (don't backfill forever)
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 7200   # Hard cap: 2h — full maintenance on large repos can take 30-60m
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kopia-maintenance
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: kopia
            # SHA-pinned per .claude/rules/always-pin-sha. Must be compatible
            # with VolSync mover's Kopia version (VolSync 0.18.x ships kopia
            # ~0.20). Renovate tracks tag + digest in lockstep.
            image: kopia/kopia:0.23.0@sha256:bd6a449c263465c388339c0637dcd25562e99dcdde286c9d51ade81e138bbf2c
            imagePullPolicy: IfNotPresent
            env:
            # Same S3 endpoint + bucket as the pvc-plumber operator's
            # deployment.yaml. Bare host:port (kopia rejects fully-qualified
            # URLs); KOPIA_S3_DISABLE_TLS=true selects HTTP.
            - name: KOPIA_S3_ENDPOINT
              value: "192.168.10.133:30292"
            - name: KOPIA_S3_BUCKET
              value: "volsync-kopia"
            - name: KOPIA_S3_DISABLE_TLS
              value: "true"
            # Stable synthetic identity — independent of pod name / VolSync
            # mover churn. Kopia records "<username>@<hostname>" in repo
            # config as maintenance owner.
            - name: KOPIA_OVERRIDE_USERNAME
              value: "maintenance"
            - name: KOPIA_OVERRIDE_HOSTNAME
              value: "cluster"
            - name: KOPIA_CONFIG_PATH
              value: "/tmp/kopia/repository.config"
            - name: KOPIA_LOG_DIR
              value: "/tmp/kopia/logs"
            - name: KOPIA_CACHE_DIRECTORY
              value: "/tmp/kopia/cache"
            - name: HOME
              value: "/tmp"
            # Kopia's static-build binary can't resolve the current user via
            # NSS (no CGO), so it falls back to $USER — must be set or kopia
            # aborts with "Cannot determine current user: user: Current
            # requires cgo or $USER set in environment".
            - name: USER
              value: "maintenance"
            # Go's user.Current() falls back to USER *or* LOGNAME when built
            # without cgo — set both for safety.
            - name: LOGNAME
              value: "maintenance"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
              seccompProfile:
                type: RuntimeDefault
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                cpu: "2"
                # 4Gi: `kopia maintenance run --full` loads blob indexes into
                # memory. 2Gi was enough for small repos but the kopia repo
                # grew past ~27Gi of blobs and the job OOMed silently before
                # printing anything useful. 4Gi gives headroom.
                memory: 4Gi
            command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Read credentials lazily from the mounted Secret directory.
              # The shared Secret is produced in this namespace by the
              # ClusterExternalSecret/volsync-kopia-repository (selector:
              # volsync.backube/privileged-movers=true on the namespace).
              # Source of truth:
              #   kubectl describe secret volsync-kopia-repository -n volsync-system
              CREDS_DIR=/var/secret/kopia-repo
              if [ ! -s "$CREDS_DIR/KOPIA_PASSWORD" ] || \
                 [ ! -s "$CREDS_DIR/AWS_ACCESS_KEY_ID" ] || \
                 [ ! -s "$CREDS_DIR/AWS_SECRET_ACCESS_KEY" ] || \
                 [ ! -s "$CREDS_DIR/KOPIA_REPOSITORY" ]; then
                echo "ERROR: Secret/volsync-kopia-repository not fully populated."
                echo "  Expected files in $CREDS_DIR:"
                echo "    - KOPIA_PASSWORD"
                echo "    - AWS_ACCESS_KEY_ID"
                echo "    - AWS_SECRET_ACCESS_KEY"
                echo "    - KOPIA_REPOSITORY (sets the bucket prefix)"
                echo "  Confirm ClusterES + ESO have rendered the Secret in volsync-system."
                exit 1
              fi
              KOPIA_PASSWORD="$(cat "$CREDS_DIR/KOPIA_PASSWORD")"
              AWS_ACCESS_KEY_ID="$(cat "$CREDS_DIR/AWS_ACCESS_KEY_ID")"
              AWS_SECRET_ACCESS_KEY="$(cat "$CREDS_DIR/AWS_SECRET_ACCESS_KEY")"
              export KOPIA_PASSWORD AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY

              # The Secret's KOPIA_REPOSITORY is the canonical
              # s3://<bucket>/<prefix> URL VolSync movers use. The
              # `kopia repository connect s3` subcommand does NOT consume the
              # URL — it takes --bucket and --prefix separately. Parse the
              # prefix here so this Job stays at the same path in the bucket
              # as every backup written by every RS in the cluster. Without
              # --prefix, kopia connects to the bucket ROOT and reports
              # "repository not initialized" because the repo lives at the
              # prefixed path. Source of truth:
              #   ClusterExternalSecret/volsync-kopia-repository ->
              #   KOPIA_REPOSITORY = s3://volsync-kopia/cluster
              #
              # Pure parameter expansion (no sed/awk subshells) so a bucket-
              # root or scheme-less URL fails on its own line instead of
              # silently degrading into "" / "/".
              KOPIA_REPOSITORY="$(cat "$CREDS_DIR/KOPIA_REPOSITORY")"
              repo_no_scheme="${KOPIA_REPOSITORY#s3://}"
              repo_bucket="${repo_no_scheme%%/*}"
              KOPIA_PREFIX="${repo_no_scheme#*/}"

              if [ "$repo_bucket" = "$repo_no_scheme" ] || [ -z "$KOPIA_PREFIX" ]; then
                echo "ERROR: refusing to connect to bucket root. KOPIA_REPOSITORY has no prefix."
                exit 1
              fi

              if [ "$repo_bucket" != "$KOPIA_S3_BUCKET" ]; then
                echo "ERROR: KOPIA_REPOSITORY bucket does not match KOPIA_S3_BUCKET."
                exit 1
              fi

              KOPIA_PREFIX="${KOPIA_PREFIX%/}/"
              echo "Connecting to s3://$KOPIA_S3_BUCKET/$KOPIA_PREFIX"

              echo "=== Connecting to Kopia repository (S3) ==="
              # Kopia 0.20+ ignores KOPIA_OVERRIDE_HOSTNAME env — only the
              # `--override-hostname` flag on `repository connect` actually
              # sets the client identity. Without it, the pod hostname
              # (some generated string) is used, and `kopia maintenance
              # run` errors out with:
              #   "maintenance must be run by designated user:
              #    maintenance@cluster"
              # because the owner stored on the repo (maintenance@cluster)
              # doesn't match the running client identity
              # (maintenance@<pod-name>).
              #
              # `--disable-tls` aligns with KOPIA_S3_DISABLE_TLS=true. Flip
              # BOTH together if RustFS ever moves behind TLS termination.
              kopia repository connect s3 \
                --endpoint="$KOPIA_S3_ENDPOINT" \
                --bucket="$KOPIA_S3_BUCKET" \
                --prefix="$KOPIA_PREFIX" \
                --disable-tls \
                --password="$KOPIA_PASSWORD" \
                --override-hostname=cluster \
                --override-username=maintenance

              echo "=== Current maintenance policy ==="
              kopia maintenance info || true

              echo "=== Claiming ownership (idempotent) ==="
              # Safe: --owner matches our resolved identity. Kopia validates
              # that --owner matches the running client's identity before
              # accepting the change.
              kopia maintenance set \
                --owner="maintenance@cluster"

              # Schedule internal maintenance cadences (flags are
              # --quick-interval / --full-interval, NOT
              # --*-maintenance-interval).
              kopia maintenance set \
                --quick-interval=24h \
                --full-interval=168h

              echo "=== Running maintenance ==="
              # Kopia decides quick vs full internally based on the policy
              # above. No --safety=none for recurring GitOps maintenance —
              # unsafe GC belongs in a manual break-glass operation only.
              kopia maintenance run

              echo "=== Done ==="
            volumeMounts:
            - name: kopia-credentials
              mountPath: /var/secret/kopia-repo
              readOnly: true
            - name: kopia-tmp
              mountPath: /tmp/kopia
          volumes:
          # Lazy-credentials mount — pulls the shared Secret produced by the
          # ClusterExternalSecret/volsync-kopia-repository (which targets every
          # namespace labeled volsync.backube/privileged-movers=true; see
          # namespace.yaml in this directory). Files exposed at /var/secret/
          # kopia-repo includes KOPIA_PASSWORD, AWS_ACCESS_KEY_ID,
          # AWS_SECRET_ACCESS_KEY, and KOPIA_REPOSITORY. Do not log repository
          # status JSON from this Job: Kopia masks the secret key but includes
          # the access key ID in plain text.
          - name: kopia-credentials
            secret:
              secretName: volsync-kopia-repository
              # 0440 = readable by the kopia container's UID/GID (568) and
              # the runtime's group; nothing else.
              defaultMode: 0440
          - name: kopia-tmp
            emptyDir: {}
          # Avoid scheduling on GPU nodes — leave their CPU for inference work
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  preference:
                    matchExpressions:
                      - key: gpu-worker
                        operator: DoesNotExist
