# external-dns runs non-root (uid 65534). nonroot-v2 admits it without
# stripping the UID. The Helm release creates ServiceAccount "external-dns".
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: external-dns-nonroot-v2
  namespace: external-dns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: external-dns
    namespace: external-dns
