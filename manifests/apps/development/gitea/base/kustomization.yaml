apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gitea
resources:
- namespace.yaml
- externalsecret.yaml
helmCharts:
- name: gitea
  repo: https://dl.gitea.com/charts/
  version: 12.6.0
  releaseName: gitea
  namespace: gitea
  valuesFile: values.yaml

patches:
- path: fix-permissions-patch.yaml
  target:
    kind: Deployment
    name: gitea
- path: patches/gitea-shared-storage-pvc.jsonpatch.yaml
  target:
    kind: PersistentVolumeClaim
    name: gitea-shared-storage
