apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflared-token
  namespace: cloudflared
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: cloudflared-token
    creationPolicy: Owner
  data:
    # 1Password item cloudflared-sno (homelab-prod), field tunnel-token = the
    # NUC-LAB connector token (the eyJhIjoi... string from the tunnel's run
    # command). It encodes AccountTag/TunnelID/TunnelSecret, so no separate
    # credentials.json is needed; routes still come from the local config.yaml.
    - secretKey: tunnel-token
      remoteRef:
        key: cloudflared-sno
        property: tunnel-token
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
