# cert-manager hardcodes runAsUser 65534; restricted-v2 rejects fixed UIDs.
# Grant nonroot-v2 so the controllers run as their designed non-root UID.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-nonroot-v2
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:nonroot-v2
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cert-manager
  - kind: ServiceAccount
    name: cert-manager-cainjector
    namespace: cert-manager
  - kind: ServiceAccount
    name: cert-manager-webhook
    namespace: cert-manager
