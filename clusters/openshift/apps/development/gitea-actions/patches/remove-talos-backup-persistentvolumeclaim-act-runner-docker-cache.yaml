apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: act-runner-docker-cache
  namespace: gitea-actions
  labels:
    backup-exempt:
  annotations:
    storage.vanillax.dev/backup-exempt-reason:
# Regenerable CI docker layer cache — node-local local-path, no TrueNAS dependency.
spec:
  storageClassName: local-path
