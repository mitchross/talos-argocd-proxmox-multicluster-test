# OTel operator observability overlay — optional, post-monitoring.
# Deployed by infrastructure/controllers/argocd/apps/custom-entrypoints/opentelemetry-operator-observability-app.yaml
# at a wave AFTER kube-prometheus-stack so the monitoring.coreos.com CRDs exist.
# Bootstrap-critical OTel operator lives in infrastructure/controllers/opentelemetry-operator
# and renders ZERO monitoring CRs.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: opentelemetry
resources:
  - servicemonitor.yaml
