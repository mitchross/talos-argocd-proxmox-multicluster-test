apiVersion: v1
kind: ConfigMap
metadata:
  name: truenas-iscsi-config-tmpl
  namespace: democratic-csi
data:
  # Non-secret democratic-csi config — safe to commit. The `{{ .apiKey }}`
  # placeholder is filled by externalsecret-iscsi.yaml (via templateFrom),
  # which pulls the key from 1Password and renders the final
  # `truenas-iscsi-config` Secret that the driver mounts.
  driver-config-file.yaml: |
    driver: freenas-api-iscsi
    instance_id:
    httpConnection:
      protocol: https
      host: 192.168.10.133
      port: 443
      apiKey: "{{ .apiKey }}"
      allowInsecure: true
    zfs:
      datasetParentName: BigTank/k8s/iscsi/v
      detachedSnapshotsDatasetParentName: BigTank/k8s/iscsi/s
      zvolEnableReservation: false
    iscsi:
      targetPortal: "192.168.10.133:3260"
      interface:
      namePrefix: csi-
      nameSuffix: "-cluster"
      targetGroups:
        - targetGroupPortalGroup: 1
          targetGroupInitiatorGroup: 1
          targetGroupAuthType: None
      extentInsecureTpc: true
      extentBlocksize: 512
      extentRpm: "SSD"
      extentAvailThreshold: 0
