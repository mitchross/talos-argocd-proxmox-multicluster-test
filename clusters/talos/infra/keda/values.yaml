# KEDA Helm values — event-driven autoscaler.
#
# Why KEDA here: the Temporal blog (temporal.io/blog/tips-for-running-
# temporal-on-kubernetes) explicitly calls out that CPU/memory metrics
# MISLEAD for Temporal workers — the real scaling signals are Task Queue
# backlog and schedule-to-start latency. KEDA ships a first-class Temporal
# scaler that polls a Temporal frontend and emits HPA metrics from queue
# depth, so workers scale up when work arrives and down when it drains.
#
# Defaults are mostly fine — we only override image pinning and adjust
# the operator's own resource requests to leave room on this homelab.

# Use cert-manager for webhook certs instead of the default cert-gen Job.
# Cluster already has cert-manager running, and Helm hook Jobs for webhook
# certs are fragile under ArgoCD (the SA can get deleted before the Job
# runs, deadlocking the webhook forever).
certificates:
  autoGenerated: false
  certManager:
    enabled: true
    generateCA: true

operator:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

metricsServer:
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

webhooks:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

# Metrics endpoints/services stay ON, but the ServiceMonitor CRs are DISABLED
# here. ServiceMonitor is a monitoring.coreos.com CRD that does not exist until
# kube-prometheus-stack at Wave 5 — bundling it in this Wave-4 bootstrap-critical
# app coupled cluster restore to Prometheus Operator and deadlocked the
# 2026-06-01 nuke/rebuild. Observability is OPTIONAL and must not be a bootstrap
# dependency. The KEDA ServiceMonitors now live in the separate post-monitoring
# app `keda-observability` (infrastructure/controllers/keda-observability).
# Do NOT re-enable these here.
prometheus:
  metricServer:
    enabled: true
    serviceMonitor:
      enabled: false
  operator:
    enabled: true
    serviceMonitor:
      enabled: false
  webhooks:
    enabled: true
    serviceMonitor:
      enabled: false
