# Basemap — go-pmtiles serving a Protomaps PMTiles archive from a PVC
# populated by the basemap-bootstrap Job. Earlier this image baked the
# pmtiles file in (see git history); the baked extract was Michigan-only
# (bbox -90,40 → -80,48), so zooming out showed blank tiles for most of
# CONUS. Splitting data from image lets us swap the bbox via the bootstrap
# Job without rebuilding/repushing the image.
#
# Init container blocks pod start until the Job has populated the PVC, so
# we never serve a window of "Archive not found" 204s on a fresh deploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basemap
  namespace: radar-ng
  labels:
    app: basemap
spec:
  replicas: 1
  strategy:
    type: Recreate  # RWO PVC; only one writer at a time
  selector:
    matchLabels:
      app: basemap
  template:
    metadata:
      labels:
        app: basemap
    spec:
      # fsGroup so the non-root container can read the file the Job wrote
      # (the Job uses the same uid/gid).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Block pod start until the bootstrap Job has populated the PVC.
        # `until` loop polls every 5s; the busybox image is tiny so the
        # extra startup latency is just the image pull (~2 MB).
        - name: wait-for-pmtiles
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              echo "waiting for /data/basemap.pmtiles..."
              until [ -s /data/basemap.pmtiles ]; do
                sleep 5
              done
              echo "found $(ls -lh /data/basemap.pmtiles)"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: pmtiles
              mountPath: /data
              readOnly: true
      containers:
        - name: basemap
          # Image still bakes a Michigan-only extract at /data/basemap.pmtiles
          # (built from backend/basemap/Dockerfile in the radar-ng repo). The
          # PVC mount below shadows that path entirely, so the baked file is
          # invisible at runtime — only the PVC contents are served. Future
          # cleanup: keep the image data-free once the baked COPY step is gone.
          image: registry.vanillax.me/radar-ng-basemap:v1.1.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8081
              name: http
          volumeMounts:
            - name: pmtiles
              mountPath: /data
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: pmtiles
          persistentVolumeClaim:
            claimName: pmtiles
