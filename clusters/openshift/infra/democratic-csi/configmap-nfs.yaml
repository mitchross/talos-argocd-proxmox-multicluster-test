apiVersion: v1
kind: ConfigMap
metadata:
  name: truenas-nfs-config-tmpl
  namespace: democratic-csi
data:
  # Non-secret democratic-csi config — safe to commit. `{{ .apiKey }}` is filled
  # by externalsecret-nfs.yaml (templateFrom) into the `truenas-nfs-config` Secret.
  driver-config-file.yaml: |
    driver: freenas-api-nfs
    instance_id:
    httpConnection:
      protocol: https
      host: 192.168.10.133
      port: 443
      apiKey: "{{ .apiKey }}"
      allowInsecure: true
    zfs:
      datasetParentName: BigTank/k8s/nfs/v
      detachedSnapshotsDatasetParentName: BigTank/k8s/nfs/s
      datasetEnableQuotas: true
      datasetPermissionsMode: "0777"
      datasetPermissionsUser: 0
      datasetPermissionsGroup: 0
    nfs:
      shareHost: 192.168.10.133
      shareAlldirs: false
      shareAllowedNetworks:
        - 192.168.10.0/24
      shareMaprootUser: root
      shareMaprootGroup: root
