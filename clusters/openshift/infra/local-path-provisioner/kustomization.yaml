apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No global `namespace:` here on purpose: it would try to namespace the
# cluster-scoped MachineConfig. The Helm release namespace + explicit
# namespaces on the resources below are sufficient.
helmCharts:
  - name: local-path-provisioner
    repo: https://charts.containeroo.ch
    version: 0.0.37
    releaseName: local-path-provisioner
    namespace: local-path-storage
    includeCRDs: false
    valuesFile: values.yaml
resources:
  - namespace.yaml
  - machineconfig.yaml
  - scc-rolebinding.yaml
