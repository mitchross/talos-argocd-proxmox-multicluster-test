apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: swarmui-dlbackend
  namespace: swarmui
  labels:
    backup-exempt:
  annotations:
    storage.vanillax.dev/backup-exempt-reason:
# Regenerable downloaded backends — node-local local-path, no TrueNAS dependency.
spec:
  storageClassName: local-path
