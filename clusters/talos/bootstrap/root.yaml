apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  annotations:
    # Manifest-generate-paths cache hint: only invalidate root's manifest cache
    # when files under this Application's source path change. Without this, any
    # commit anywhere in the repo forces repo-server to re-render the root tree.
    argocd.argoproj.io/manifest-generate-paths: "."
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    path: clusters/talos/argocd
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
    retry:
      # Bounded retry on root (children keep `limit: -1`). A stuck sync op
      # holds a frozen manifest snapshot; while `limit: -1` is infinite, a
      # failed child (e.g. otel's CrashLoopBackOff on 2026-04-20) keeps
      # the op alive forever and wedges every new git push behind the
      # stale snapshot. With `limit: 10`, the op fails cleanly after
      # ~10×3m = ~30 min ceiling; `selfHeal: true` then triggers a FRESH
      # sync op on the next reconcile with CURRENT git — functionally
      # still infinite, just with manifest-refresh between ops.
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
  - group: argoproj.io
    kind: Application
    jsonPointers:
    - /status
    - /operation
  - group: argoproj.io
    kind: ApplicationSet
    jsonPointers:
    - /status
