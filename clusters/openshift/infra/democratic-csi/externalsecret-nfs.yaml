apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: truenas-nfs-config
  namespace: democratic-csi
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: 1password
  target:
    name: truenas-nfs-config
    creationPolicy: Owner
  data:
    - secretKey: driver-config-file.yaml
      remoteRef:
        key: democratic-csi-truenas-nfs
        property: config
