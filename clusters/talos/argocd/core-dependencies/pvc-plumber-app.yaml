# pvc-plumber v4 — Argo Application.
#
# Sync wave 2: same level as volsync-backup-cluster (MAP + ClusterES).
# The two co-exist safely — pvc-plumber reconciles permissively; the MAP
# gates VolSync mover Jobs at the apiserver. No admission conflict.
#
# AUTOMATED SYNC ENABLED 2026-06-11. The original manual-sync gate existed
# for the Phase 3 audit rollout (placeholder all-zero image digest); the
# image has been a real SHA-pinned release since v4.0.1. The 2026-06-02
# nuke runbook's "sync pvc-plumber manually once" step is obsolete —
# rebuilds are now fully hands-off at wave 2. The operator's cluster-wide
# VolSync writer privileges are gated by the SHA-pinned digest in
# deployment.yaml (Renovate digest bumps still go through PR review).
#
# See clusters/talos/infra/pvc-plumber/README.md for the full flow.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pvc-plumber
  namespace: argocd
  annotations:
    # Wave 2 — after VolSync operator (Wave 1), same level as the MAP
    # + ClusterES at clusters/talos/infra/volsync-backup-cluster/.
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/manifest-generate-paths: ".;/manifests/infra"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: talos-infrastructure
  source:
    repoURL: https://github.com/mitchross/talos-argocd-proxmox-multicluster-test.git
    targetRevision: main
    path: clusters/talos/infra/pvc-plumber
  destination:
    server: https://kubernetes.default.svc
    # destination.namespace is nominal (argocd) — the manifests under
    # `path:` create their own pvc-plumber Namespace. ArgoCD uses
    # destination.namespace only for resources without an explicit
    # metadata.namespace field, of which we have none.
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
