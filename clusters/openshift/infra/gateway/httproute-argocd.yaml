apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  labels:
    external-dns-technitium: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # Technitium private DNS should hit the live openshift-gateway address.
    external-dns.alpha.kubernetes.io/target: 192.168.10.230
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: openshift-gateway
      namespace: openshift-ingress
      sectionName: https
  hostnames:
    - argocd.vanillax.xyz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
